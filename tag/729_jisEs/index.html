<script>

  let sideBarOpen = 'sidebar-open';
  let body = document.body;
  let back2Top = document.querySelector('#back_to_top'),
  back2TopText = document.querySelector('#back_to_top_text'),
  drawerBox = document.querySelector('#drawer_box'),
  rightSideBar = document.querySelector('.sidebar'),
  viewport = document.querySelector('body');

  function scrollAnimation(currentY, targetY) {
   
    let needScrollTop = targetY - currentY
    let _currentY = currentY
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10)
      _currentY += dist
      window.scrollTo(_currentY, currentY)
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY)
      } else {
        window.scrollTo(_currentY, targetY)
      }
    }, 1)
  }

  back2Top.addEventListener("click", function(e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });
  
  window.addEventListener('scroll', function(e) {
    let percent = document.scrollingElement.scrollTop / (document.scrollingElement.scrollHeight - document.scrollingElement.clientHeight) * 100;
    if (percent > 1 && !back2Top.classList.contains('back-top-active')) {
      back2Top.classList.add('back-top-active');
    }
    if (percent == 0) {
      back2Top.classList.remove('back-top-active');
    }
    if (back2TopText) {
      back2TopText.textContent = Math.floor(percent);
    }
  });

  
  let hasCacu = false;
  window.onresize = function() {
    if (window.width > 991) {
      calcuHeight();
    } else {
      hasCacu = false;
    }
  }

  function calcuHeight() {
    // 动态调整站点概览高度
    if (!hasCacu && back2Top.classList.contains('pisces') || back2Top.classList.contains('gemini')) {
      let sideBar = document.querySelector('.sidebar');
      let navUl = document.querySelector('#site_nav');
      sideBar.style = 'margin-top:' + (navUl.offsetHeight + navUl.offsetTop + 15) + 'px;';
      hasCacu = true;
    }
  }
  calcuHeight();
  
  let open = false, MOTION_TIME = 300, RIGHT_MOVE_DIS = '320px';

  if (drawerBox) {
    let rightMotions = document.querySelectorAll('.right-motion');
    let right = drawerBox.classList.contains('right');

    let transitionDir = right ? "transition.slideRightIn" : "transition.slideLeftIn";

    let openProp, closeProp;
    if (right) {
      openProp = {
        paddingRight: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingRight: '0px'
      };
    } else {
      openProp = {
        paddingLeft: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingLeft: '0px'
      };
    }

    drawerBox.onclick = function() {
      open = !open;
      window.Velocity(rightSideBar, 'stop');
      window.Velocity(viewport, 'stop');
      window.Velocity(rightMotions, 'stop');
      if (open) {
        window.Velocity(rightSideBar, {
          width: RIGHT_MOVE_DIS
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, transitionDir,{ });
          }
        })
        window.Velocity(viewport, openProp,{
          duration: MOTION_TIME
        });
      } else {
        window.Velocity(rightSideBar, {
          width: '0px'
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, {
              opacity: 0
            });
          }
        })
        window.Velocity(viewport, closeProp ,{
          duration: MOTION_TIME
        });
      }
      for (let i = 0; i < drawerBox.children.length; i++) {
        drawerBox.children[i].classList.toggle('muse-line');
      }
      drawerBox.classList.toggle(sideBarOpen);
    }
  }

  // 链接跳转
  let newWindow = 'false'
  if (newWindow === 'true') {
    let links = document.querySelectorAll('.post-body a')
    links.forEach(item => {
      if (!item.classList.contains('btn')) {
        item.setAttribute("target","_blank");
      }
    })
  }
  // 代码高亮
  hljs.initHighlightingOnLoad();

</script>

<script>
  //拿来主义(真香)^_^，Clipboard 实现摘自掘金 https://juejin.im/post/5aefeb6e6fb9a07aa43c20af
  window.Clipboard = (function (window, document, navigator) {
    var textArea,
      copy;

    // 判断是不是ios端
    function isOS() {
      return navigator.userAgent.match(/ipad|iphone/i);
    }
    //创建文本元素
    function createTextArea(text) {
      textArea = document.createElement('textArea');
      textArea.value = text;
      textArea.style.width = 0;
      textArea.style.height = 0;
      textArea.clientHeight = 0;
      textArea.clientWidth = 0;
      document.body.appendChild(textArea);
    }
    //选择内容
    function selectText() {
      var range,
        selection;

      if (isOS()) {
        range = document.createRange();
        range.selectNodeContents(textArea);
        selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textArea.setSelectionRange(0, 999999);
      } else {
        textArea.select();
      }
    }

    //复制到剪贴板
    function copyToClipboard() {
      try {
        document.execCommand("Copy")
      } catch (err) {
        alert("复制错误！请手动复制！")
      }
      document.body.removeChild(textArea);
    }

    copy = function (text) {
      createTextArea(text);
      selectText();
      copyToClipboard();
    };

    return {
      copy: copy
    };
  })(window, document, navigator);

  function copyCode(e) {
    if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
      let code = e.currentTarget.querySelector('code');
      var text = code.innerText;
      if (e.srcElement.textContent === '复制成功') {
        console.log('复制操作频率过高');
        return;
      }
      e.srcElement.textContent = '复制成功';
      (function (elem) {
        setTimeout(() => {
          if (elem.textContent === '复制成功') {
            elem.textContent = '复制代码'
          }
        }, 1000);
      })(e.srcElement)
      Clipboard.copy(text);
    }
  }

  let pres = document.querySelectorAll('pre');
  pres.forEach(pre => {
    let code = pre.querySelector('code');
    let copyElem = document.createElement('span');
    copyElem.classList.add('copy-code');
    copyElem.textContent = '复制代码';
    pre.appendChild(copyElem);
    pre.onclick = copyCode
  })
</script>

&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;异步写入&#34;&gt;异步写入&lt;/h3&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;//不能直接使用同步的client，初始化一个异步的client
//创建EventLoops
EventPolicy eventPolicy = new EventPolicy();
EventLoops eventLoops = new NioEventLoops(eventPolicy,4);
 
//初始化异步as客户端需要指定EventLoops
ClientPolicy clientPolicy = new ClientPolicy();
clientPolicy.eventLoops=eventLoops;
 
AerospikeClient aerospikeClient = new AerospikeClient(clientPolicy,&amp;quot;47.98.237.128&amp;quot;,3000);
 
 
//开始准备异步写入
EventLoop eventLoop = eventLoops.next();
 
WriteListener writeListener = new WriteListener() {
    @Override
    public void onSuccess(Key key) {
        System.out.println(&amp;quot;写入成功&amp;quot;);
        System.out.println(key.toString());
    }
     
    @Override
    public void onFailure(AerospikeException exception) {
        System.out.println(&amp;quot;写入异常&amp;quot;);
        System.out.println(exception.toString());
    }
};
Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test_async&amp;quot;);
Bin bin = new Bin(&amp;quot;test&amp;quot;,&amp;quot;test_async&amp;quot;);
aerospikeClient.put(eventLoop, writeListener,null,key,bin);
 
TimeUnit.SECONDS.sleep(5);
 
client.close();
eventLoops.close();
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;对整数类型bin直接操作&#34;&gt;对整数类型bin直接操作&lt;/h3&gt;
&lt;p&gt;该操作会把add方法参数中，bin名相同的加到服务器中的bin值中。add方法只能操作整数类型。&lt;br&gt;
add方法中的所有bin对应服务器中的类型必须为整数类型， 如果有一个bin不为整数类型会抛出异常。&lt;br&gt;
add中可含有其他类型bin，必须服务器中不存在该bin才可正常写入。&lt;br&gt;
&lt;em&gt;add操作&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;//在”DATA“的bin值加1，在”tt“的bin值加2
Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;123&amp;quot;);
Bin bin = new Bin(&amp;quot;DATA&amp;quot;,1);
Bin bbin = new Bin(&amp;quot;tt&amp;quot;,2);
client.add(null,key,bin,bbin);
 
//获取结果
Record record = client.get(null,key);
System.out.println(record.toString());
//(gen:1),(exp:355197871),(bins:(tt:2),(DATA:1))
//再次执行
//(gen:2),(exp:355197949),(bins:(tt:4),(DATA:2))
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;对字符类型直接操作&#34;&gt;对字符类型直接操作&lt;/h3&gt;
&lt;p&gt;对字符串操作与整数操作类似，对应的方法中所有的bin，在as服务器中必须对字符串类型，否则会抛出异常，可以带其他类型的bin参数，必须保证该bin在as服务器中不存在。&lt;/p&gt;
&lt;ol&gt;
&lt;li&gt;对字符串末尾追加操作&lt;br&gt;
&lt;em&gt;字符串增加后缀&lt;/em&gt;&lt;/li&gt;
&lt;/ol&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;//在”DATA“的bin值加1，在”tt“的bin值加2
Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;strTest&amp;quot;);
Bin bin = new Bin(&amp;quot;DATA&amp;quot;,&amp;quot;2&amp;quot;);
Bin bbin = new Bin(&amp;quot;tt&amp;quot;,&amp;quot;b&amp;quot;);
client.append(null,key,bin,bbin);
 
//获取结果
Record record = client.get(null,key);
System.out.println(record.toString());
//(gen:1),(exp:355197986),(bins:(tt:b),(DATA:2))
//将bin的值改为3，bbin的值改为c，再次执行
//(gen:2),(exp:355198039),(bins:(tt:bc),(DATA:23))
&lt;/code&gt;&lt;/pre&gt;
&lt;ol&gt;
&lt;li&gt;对字符串头部插入操作&lt;br&gt;
&lt;em&gt;字符串增加前缀&lt;/em&gt;&lt;/li&gt;
&lt;/ol&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;//在”DATA“的bin值前追加&#39;-&#39;，在”tt”的bin值前追加&#39;-&#39;
Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;strTest&amp;quot;);
Bin bin = new Bin(&amp;quot;DATA&amp;quot;,&amp;quot;-&amp;quot;);
Bin bbin = new Bin(&amp;quot;tt&amp;quot;,&amp;quot;-&amp;quot;);
client.prepend(null,key,bin,bbin);
 
//获取结果
Record record = client.get(null,key);
System.out.println(record.toString());
//再追加key的操作后，执行本操作结果为
//(gen:3),(exp:355198133),(bins:(tt:-bc),(DATA:-23))
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;touch操作&#34;&gt;touch操作&lt;/h3&gt;
&lt;p&gt;用新的写策略更新记录。&lt;br&gt;
&lt;em&gt;touch更新过期时间&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;123&amp;quot;);
Bin bin = new Bin(&amp;quot;DATA&amp;quot;,&amp;quot;testValue&amp;quot;);
 
WritePolicy writePolicy = new WritePolicy();
writePolicy.expiration=1000;
 
client.put(writePolicy,key,bin);
 
Record record = client.get(null,key);
System.out.println(record.toString());
System.out.println(record.getTimeToLive());
//(gen:1),(exp:354107415),(bins:(DATA:testValue))
//1000
 
writePolicy.expiration=100;
client.touch(writePolicy,key);
 
Record record1 = client.get(null,key);
System.out.println(record1.toString());
System.out.println(record1.getTimeToLive());
//(gen:2),(exp:354106515),(bins:(DATA:testValue))
//100
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;operation操作&#34;&gt;Operation操作&lt;/h3&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;方法&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;Operation.get()&lt;/td&gt;
&lt;td&gt;获取全部bin，一个AsClient.operate()中只能有一个get()，且不能有其他get(String binName)否则会抛异常&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Operation.get(String binName)&lt;/td&gt;
&lt;td&gt;获取单个bin，一个AsClient.operate()中可以有多个get(String binName)&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Operation.getHeader()&lt;/td&gt;
&lt;td&gt;只获取除bin外信息&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Operation.put(Bin bin)&lt;/td&gt;
&lt;td&gt;与AsClient同名方法类似&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Operation.append(Bin bin)&lt;/td&gt;
&lt;td&gt;与AsClient同名方法类似&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Operation.prepend(Bin bin)&lt;/td&gt;
&lt;td&gt;与AsClient同名方法类似&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Operation.add(Bin bin)&lt;/td&gt;
&lt;td&gt;与AsClient同名方法类似&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Operation.touch()&lt;/td&gt;
&lt;td&gt;touch，一般用于更新过期时间&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;p&gt;&lt;em&gt;touch更新过期时间&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;12345&amp;quot;);
Bin bin = new Bin(&amp;quot;DATA&amp;quot;,1);
WritePolicy policy = new WritePolicy();
policy.expiration=100;
client.put(policy,key,bin);
Record record = client.get(null,key);
System.out.println(record.getTimeToLive());
//100
//更新记录的过期时间，以传入的WritePolicy为准，当前操作传入null则为client中设置的默认写入策略
client.operate(null,key, Operation.touch());
Record record1 = client.get(null,key);
System.out.println(record1.getTimeToLive());
//2592000
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;em&gt;get演示&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;operationTest&amp;quot;);
 
Bin bin = new Bin(&amp;quot;Test&amp;quot;,123);
Bin t = new Bin(&amp;quot;a&amp;quot;,&amp;quot;test&amp;quot;);
//先放入t，然后获取当前key的record，再放入bin，并再加一个bin
Record record = client.operate(null,key,Operation.put(t),Operation.get(),Operation.put(bin),Operation.add(bin));
//打印的结果中只包含t对应的bin
System.out.println(record.toString());
//(gen:1),(exp:355198995),(bins:(a:test))
//获取完整结果
Record record1 = client.get(null,key);
System.out.println(record1.toString());
//(gen:1),(exp:355198995),(bins:(a:test),(Test:246))
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;em&gt;get(binName)演示&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;operationTest&amp;quot;);
 
Bin bin = new Bin(&amp;quot;Test&amp;quot;,123);
Bin t = new Bin(&amp;quot;a&amp;quot;,&amp;quot;test&amp;quot;);
Record record = client.operate(null,key,Operation.put(t),Operation.get(&amp;quot;a&amp;quot;),Operation.put(bin),Operation.get(&amp;quot;Test&amp;quot;),Operation.add(bin));
 
//输出结果为：包含t，以及Test未自加前的record
System.out.println(record.toString());
//(gen:1),(exp:355199080),(bins:(a:test),(Test:123))
//获取完整结果
Record record1 = client.get(null,key);
System.out.println(record1.toString());
//(gen:1),(exp:355199080),(bins:(a:test),(Test:246))
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;listoperation操作&#34;&gt;ListOperation操作&lt;/h3&gt;
&lt;p&gt;可以直接操作类型为list的bin。支持负索引，即从末尾开始操作。（index 0）为第一项，（index -1）为倒数第一项。（index 1 ,count 2）为第二和第三项，（index -5 ,count 4）为从倒数第二，第三，第四，第五项。&lt;br&gt;
如果索引超出列表范围将抛出异常；如果范围部分超出列表范围，则返回有效部分。&lt;/p&gt;
&lt;h4 id=&#34;listreturntype&#34;&gt;ListReturnType&lt;/h4&gt;
&lt;p&gt;部分方法需要传入标志返回类型的参数。&lt;/p&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;参数&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;ListReturnType.NONE&lt;/td&gt;
&lt;td&gt;不返回任何结果&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListReturnType.INVERTED&lt;/td&gt;
&lt;td&gt;反选范围，与其他返回类型或连接&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListReturnType.REVERSE_RANK&lt;/td&gt;
&lt;td&gt;按照排序后的反序索引返回&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListReturnType.RANK&lt;/td&gt;
&lt;td&gt;按照排序后的顺序索引返回&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListReturnType.REVERSE_INDEX&lt;/td&gt;
&lt;td&gt;按照索引偏移的反序返回&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListReturnType.INDEX&lt;/td&gt;
&lt;td&gt;按照索引偏移的顺序返回&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListReturnType.VALUE&lt;/td&gt;
&lt;td&gt;返回值&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListReturnType.COUNT&lt;/td&gt;
&lt;td&gt;返回所选的数量&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h4 id=&#34;查询相关方法&#34;&gt;查询相关方法&lt;/h4&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;方法&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.get(String binName,int index)&lt;/td&gt;
&lt;td&gt;获取指定索引位置的元素&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByIndex(String binName,int index,int returnType)&lt;/td&gt;
&lt;td&gt;返回指定索引元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByIndexRange(String binName,int index,int count,int returnType)&lt;/td&gt;
&lt;td&gt;返回从指定索引开始count个元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByIndexRange(String binName,int index,int returnType)&lt;/td&gt;
&lt;td&gt;返回指定索引至末尾元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByRank(String binName,int rank,int returnType)&lt;/td&gt;
&lt;td&gt;返回按照元素大小排序后排行第rank个元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByRankRange(String binName,int rank,int count,int returnType)&lt;/td&gt;
&lt;td&gt;返回按照元素大小排序后排行第rank个开始count个元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByRankRange(String binName,int rank,int returnType)&lt;/td&gt;
&lt;td&gt;返回按照元素大小排序后排行第rank个至末尾元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByValue(String binName,Value value,int returnType)&lt;/td&gt;
&lt;td&gt;按照与传入的value相等的元素，返回对应的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByValueList(String binName,List&lt;Value&gt; values,int returnType)&lt;/td&gt;
&lt;td&gt;按照传入的valueList，返回对应的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByValueRange(String binName,Value valueBegin,Value valueEnd,int returnType)&lt;/td&gt;
&lt;td&gt;按照指定value范围内(包含头，不包含尾)的元素，返回对应的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByValueRelativeRankRange(String binName,Value value,int rank,int count,int returnType)&lt;/td&gt;
&lt;td&gt;先对list排序(不影响原顺序)，然后从传入value最近的值开始排行第rank个开始count个元素，返回这些元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByValueRelativeRankRange(String binName,Value value,int rank,int returnType)&lt;/td&gt;
&lt;td&gt;先对list排序(不影响原顺序)，然后从传入value最近的值开始排行第rank个直至末尾，返回这些元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getRange(String binName,int index)&lt;/td&gt;
&lt;td&gt;获取指定索引开始到末尾元素&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getRange(String binName,int index,int count)&lt;/td&gt;
&lt;td&gt;获取指定索引开始往后count个元素&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.size(String binName)&lt;/td&gt;
&lt;td&gt;返回list的大小&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h4 id=&#34;更新相关方法&#34;&gt;更新相关方法&lt;/h4&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;方法&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.set(String binName,int index,Value value)&lt;/td&gt;

&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.append(String binName,Value value)&lt;/td&gt;

&lt;tr&gt;
&lt;td&gt;ListOperation.append(ListPolicy policy,String binName,Value value)&lt;/td&gt;

&lt;tr&gt;
&lt;td&gt;ListOperation.insert(ListPolicy policy,String binName,int index,Value value)&lt;/td&gt;
&lt;td&gt;根据ListPolicy在对应bin的指定位置插入元素，并返回长度。&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.insertItems(String binName,int index,List&lt;Value&gt; list)&lt;/td&gt;

&lt;td&gt;ListOperation.increment(ListPolicy policy,String binName,int index,Value value)&lt;/td&gt;

&lt;/tbody&gt;
&lt;/table&gt;
&lt;h4 id=&#34;删除相关方法&#34;&gt;删除相关方法&lt;/h4&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;方法&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.pop(String binName,int index)&lt;/td&gt;
&lt;td&gt;将指定位置的元素出列，在bin中删除该元素并返回该元素&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.popRange(String binName,int index,int count)&lt;/td&gt;
&lt;td&gt;指定下边开始根据count依次出列，返回出列元素&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.popRange(String binName,int index)&lt;/td&gt;
&lt;td&gt;从指定位置开始直至末尾全部出列，返回出列元素&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.remove(String binName,int index)&lt;/td&gt;
&lt;td&gt;删除指定索引位置的元素，并返回删除的个数&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.removeRange(String binName,int index,int count)&lt;/td&gt;
&lt;td&gt;从指定索引开始依次删除count个数的元素，并返回删除的个数&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.removeRange(String binName,int index)&lt;/td&gt;
&lt;td&gt;删除指定索引到末尾的元素，返回删除的个数&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.trim(String binName,int index,int count)&lt;/td&gt;
&lt;td&gt;保留指定索引之后count个元素，其余全部删除，返回删除的个数&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.clear(String binName)&lt;/td&gt;
&lt;td&gt;清空对应bin，默认不返回结果&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.removeByValue(String binName,Value value,int returnType)&lt;/td&gt;
&lt;td&gt;删除指定值的元素，并根据returnType返回&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.removeByValueList(String binName,List&lt;Value&gt; values,int returnType)&lt;/td&gt;
&lt;td&gt;批量删除指定值的元素，并根据returnType返回&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.removeByValueRange(String binName,Value valueBegin,Value valueEnd,int returnType)&lt;/td&gt;
&lt;td&gt;删除指定开始值与结束值之间的元素(含头不含尾)，并根据returnType返回&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.removeByValueRelativeRankRange(String binName,Value value,int rank,int returnType)&lt;/td&gt;
&lt;td&gt;先对list排序，然后删除传入value最近的值开始排行第rank个直至末尾，返回这些元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.removeByValueRelativeRankRange(String binName,Value value,int rank,int count,int returnType)&lt;/td&gt;
&lt;td&gt;先对list排序，然后删除传入value最近的值开始排行第rank个开始count个元素，返回这些元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.removeByIndex(String binName,int index,int returnType)&lt;/td&gt;
&lt;td&gt;删除指定索引的元素，并返回returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.removeByIndexRange(String binName,int index,int returnType)&lt;/td&gt;
&lt;td&gt;删除指定索引至末尾的元素，并返回returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.removeByIndexRange(String binName,int index,int count,int returnType)&lt;/td&gt;
&lt;td&gt;删除指定索引后count个元素，并返回returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.removeByRank(String binName,int rank,int returnType)&lt;/td&gt;
&lt;td&gt;删除根据元素大小排序后第rank个元素，并返回returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.removeByRankRange(String binName,int rank,int returnType)&lt;/td&gt;
&lt;td&gt;删除根据元素大小排序后第rank个至最后的元素，并返回returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.removeByRankRange(String binName,int rank,int count,int returnType)&lt;/td&gt;
&lt;td&gt;删除根据元素大小排序后第rank个后count个元素，并返回returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h4 id=&#34;排序相关方法&#34;&gt;排序相关方法&lt;/h4&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;方法&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.setOrder(String binName,ListOrder order)&lt;/td&gt;
&lt;td&gt;对指定的list类型bin进行排序，返回null。order可选参数：ListOrder.ORDERED（排序）、ListOrder.UNORDERED（未排序，默认）&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.sort(String binName,int sortFlags)&lt;/td&gt;
&lt;td&gt;对指定的list类型bin进行排序，默认不返回结果。sortFlags可选参数：ListSortFlags.DEFAULT（保留重复值）、ListSortFlags.DROP_DUPLICATES（去除重复值）&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;p&gt;&lt;em&gt;示例&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;List&amp;lt;Integer&amp;gt; list = new ArrayList&amp;lt;&amp;gt;();
list.add(3);
list.add(1);
list.add(2);
Key key = new Key(&amp;quot;ns1&amp;quot;, &amp;quot;test&amp;quot;, &amp;quot;listTest&amp;quot;);
Bin bin = new Bin(&amp;quot;DATA&amp;quot;,list);
Record operate = client.operate(null, key, Operation.put(bin), Operation.get());
System.out.println(operate.toString());
//(gen:1),(exp:367153095),(bins:(DATA:[3, 1, 2]))
 
//在倒数第一个位置前插入值5，并且获取list的size
Record operate1 = client.operate(null, key, ListOperation.insert(&amp;quot;DATA&amp;quot;, -1, Value.get(5)), ListOperation.size(&amp;quot;DATA&amp;quot;));
System.out.println(operate1.toString());
//(gen:2),(exp:367153095),(bins:(DATA:[4, 4]))
System.out.println(client.get(null,key).toString());
//(gen:2),(exp:367153095),(bins:(DATA:[3, 1, 5, 2]))
 
//获取排序后的list并返回对应的值
System.out.println(client.operate(null, key, ListOperation.getByRankRange(&amp;quot;DATA&amp;quot;, 0, ListReturnType.VALUE)).toString());
//(gen:2),(exp:367153095),(bins:(DATA:[5, 3, 2, 1]))
  
System.out.println(client.get(null, key).toString());
//(gen:2),(exp:367153095),(bins:(DATA:[3, 1, 5, 2]))
//最后一位自增1
client.operate(null,key,ListOperation.increment(&amp;quot;DATA&amp;quot;,-1));
System.out.println(client.get(null, key).toString());
//(gen:3),(exp:367153719),(bins:(DATA:[3, 1, 5, 3]))
//排序并去除重复值
System.out.println(client.operate(null, key, ListOperation.sort(&amp;quot;DATA&amp;quot;, ListSortFlags.DROP_DUPLICATES)).toString());
//(gen:4),(exp:367153719),(bins:null)
System.out.println(client.get(null, key).toString());
//(gen:4),(exp:367153719),(bins:(DATA:[1, 3, 5]))
&lt;/code&gt;&lt;/pre&gt;

<script>
  // var escape = "[{&#34;content&#34;:&#34;&lt;p&gt;用简单的java代码示例去示范Aerospike常用Api操作。&lt;/p&gt;\n&lt;!-- more --&gt;\n&lt;p&gt;该文档基于以下maven依赖，根据as的官方文档以及依赖中的源码注释整理，只列出常用的操作及策略配置，只涉及功能相关，暂不涉及性能调优。下文代码中client如非特别说明即是同步客户端初始化的对象，其他代码直接使用client，不再重复初始化过程。&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-xml\&#34;&gt;&amp;lt;dependency&amp;gt;\n    &amp;lt;groupId&amp;gt;com.aerospike&amp;lt;/groupId&amp;gt;\n    &amp;lt;artifactId&amp;gt;aerospike-client&amp;lt;/artifactId&amp;gt;\n    &amp;lt;version&amp;gt;4.1.11&amp;lt;/version&amp;gt;\n&amp;lt;/dependency&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2 id=\&#34;客户端\&#34;&gt;客户端&lt;/h2&gt;\n&lt;h3 id=\&#34;同步客户端初始化\&#34;&gt;同步客户端初始化&lt;/h3&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;Host hosts = new Host(&amp;quot;47.98.237.128&amp;quot;,3000);\nAerospikeClient client = new AerospikeClient(null,hosts);\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&#34;异步客户端初始化\&#34;&gt;异步客户端初始化&lt;/h3&gt;\n&lt;p&gt;异步客户端需要在初始化时指定ClientPolicy中的eventLoops属性。&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;ClientPolicy clientPolicy = new ClientPolicy();\n \nEventPolicy eventPolicy = new EventPolicy();\neventLoops = new NioEventLoops(eventPolicy,4);\n \nclientPolicy.eventLoops = eventLoops;\n \nHost hosts = new Host(&amp;quot;47.98.237.128&amp;quot;,3000);\nAerospikeClient client = new AerospikeClient(clientPolicy,hosts);\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2 id=\&#34;更新操作\&#34;&gt;更新操作&lt;/h2&gt;\n&lt;p&gt;as中bin支持的基本类型有String、byte、byte[]、int、long、double、float、boolean，复杂类型有List、Map、Object。&lt;br&gt;\n其中写入对应类型后，再在java中读取后，byte、int、long、boolean类型会被转换为java的Long对象；float、double会被转为java的Double对象；创建bin的时候可以直接传入对应类型，也可以用Value.get(T t)传入bin值。&lt;br&gt;\n其中namespace类似mysql中数据库，set类似mysql中的表，key对应mysql中表的一行记录，bin则类似mysql中一行记录中的一个属性。&lt;/p&gt;\n&lt;h3 id=\&#34;普通类型写入\&#34;&gt;普通类型写入&lt;/h3&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;//指定写入的key，参数含义依次为:[命名空间的名称]、[set的名称]、[key]\nKey key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;key&amp;quot;);\n \n//只列出String类型的操作，其他基本类型与此类似，不再重复\n//存储一个String类型,bin的构造参数含义依次为:[bin名称]、[bin的值]\nBin strBin = new Bin(&amp;quot;strBin&amp;quot;,&amp;quot;writeStr&amp;quot;);\n//与上方代码同效\nBin strBin1 = new Bin(&amp;quot;strBin1&amp;quot;,Value.get(&amp;quot;writeStr&amp;quot;));\n \n//参数含义依次为:[写入策略]、[key]、...[bin]\nclient.put(null,key,strBin,strBin1);\n \n//获取结果\nRecord record = client.get(null,key);\nSystem.out.println(record.toString());\n//(gen:1),(exp:355197645),(bins:(strBin:writeStr),(strBin1:writeStr))\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&#34;复杂类型写入\&#34;&gt;复杂类型写入&lt;/h3&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;List&amp;lt;String&amp;gt; list = new ArrayList&amp;lt;&amp;gt;();\nlist.add(&amp;quot;a1&amp;quot;);\nlist.add(&amp;quot;b2&amp;quot;);\nlist.add(&amp;quot;c3&amp;quot;);\n \nMap&amp;lt;String,String&amp;gt; map = new HashMap&amp;lt;&amp;gt;();\nmap.put(&amp;quot;a&amp;quot;,&amp;quot;11&amp;quot;);\nmap.put(&amp;quot;b&amp;quot;,&amp;quot;22&amp;quot;);\nmap.put(&amp;quot;c&amp;quot;,&amp;quot;33&amp;quot;);\n \nKey key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;listAndMap&amp;quot;);\nBin listBin = new Bin(&amp;quot;listBin&amp;quot;,list);\n//Bin listBin1 = new Bin(&amp;quot;listBin&amp;quot;,Value.get(list));  //与上方代码同效\nBin mapBin = new Bin(&amp;quot;mapBin&amp;quot;,map);\n//Bin mapBin1 = new Bin(&amp;quot;mapBin&amp;quot;,Value.get(map));   //与上方代码同效\n \nclient.put(null,key,listBin,mapBin);\n \n//获取结果\nRecord record = client.get(null,key);\nSystem.out.println(record.toString());\n//(gen:1),(exp:355197723),(bins:(mapBin:{a=11, b=22, c=33}),(listBin:[a1, b2, c3]))\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&#34;使用写入策略\&#34;&gt;使用写入策略&lt;/h3&gt;\n&lt;p&gt;写入策略的具体配置见常用策略配置段落。&lt;br&gt;\n&lt;em&gt;写入策略-过期时间&lt;/em&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;writePolicy&amp;quot;);\nBin bin = new Bin(&amp;quot;testBin&amp;quot;,&amp;quot;test&amp;quot;);\n \nWritePolicy writePolicy = new WritePolicy();\n//设置10s后过期\nwritePolicy.expiration=10;\n//设置仅创建记录，如果记录存在则会抛异常\nwritePolicy.recordExistsAction = RecordExistsAction.CREATE_ONLY;\n \nclient.put(writePolicy,key,bin);\n \n//获取结果\nRecord record = client.get(null,key);\nSystem.out.println(record.toString());\nSystem.out.println(record.getTimeToLive());\n//(gen:1),(exp:352605790),(bins:(testBin:test))\n//10\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;&lt;em&gt;写入策略-版本&lt;/em&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;test&amp;quot;);\nBin bin = new Bin(&amp;quot;DATA&amp;quot;,0);\n \nclient.put(null,key,bin);\n \nRecord record = client.get(null,key);\nSystem.out.println(record.toString());\n//(gen:1),(exp:367148323),(bins:(DATA:0))\n \nWritePolicy writePolicy = new WritePolicy();\nwritePolicy.generation = record.generation;\nwritePolicy.generationPolicy = GenerationPolicy.EXPECT_GEN_EQUAL;\n \nclient.put(writePolicy,key,bin);\nRecord record1 = client.get(null,key);\nSystem.out.println(record1.toString());\n//(gen:2),(exp:367148323),(bins:(DATA:0))\n \nclient.put(writePolicy,key,bin);\nRecord record2 = client.get(null,key);\nSystem.out.println(record2.toString());\n//Exception in thread &amp;quot;main&amp;quot; com.aerospike.client.AerospikeException: Error Code 3: Generation error\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&#34;异步写入\&#34;&gt;异步写入&lt;/h3&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;//不能直接使用同步的client，初始化一个异步的client\n//创建EventLoops\nEventPolicy eventPolicy = new EventPolicy();\nEventLoops eventLoops = new NioEventLoops(eventPolicy,4);\n \n//初始化异步as客户端需要指定EventLoops\nClientPolicy clientPolicy = new ClientPolicy();\nclientPolicy.eventLoops=eventLoops;\n \nAerospikeClient aerospikeClient = new AerospikeClient(clientPolicy,&amp;quot;47.98.237.128&amp;quot;,3000);\n \n \n//开始准备异步写入\nEventLoop eventLoop = eventLoops.next();\n \nWriteListener writeListener = new WriteListener() {\n    @Override\n    public void onSuccess(Key key) {\n        System.out.println(&amp;quot;写入成功&amp;quot;);\n        System.out.println(key.toString());\n    }\n     \n    @Override\n    public void onFailure(AerospikeException exception) {\n        System.out.println(&amp;quot;写入异常&amp;quot;);\n        System.out.println(exception.toString());\n    }\n};\nKey key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test_async&amp;quot;);\nBin bin = new Bin(&amp;quot;test&amp;quot;,&amp;quot;test_async&amp;quot;);\naerospikeClient.put(eventLoop, writeListener,null,key,bin);\n \nTimeUnit.SECONDS.sleep(5);\n \nclient.close();\neventLoops.close();\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&#34;对整数类型bin直接操作\&#34;&gt;对整数类型bin直接操作&lt;/h3&gt;\n&lt;p&gt;该操作会把add方法参数中，bin名相同的加到服务器中的bin值中。add方法只能操作整数类型。&lt;br&gt;\nadd方法中的所有bin对应服务器中的类型必须为整数类型， 如果有一个bin不为整数类型会抛出异常。&lt;br&gt;\nadd中可含有其他类型bin，必须服务器中不存在该bin才可正常写入。&lt;br&gt;\n&lt;em&gt;add操作&lt;/em&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;//在”DATA“的bin值加1，在”tt“的bin值加2\nKey key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;123&amp;quot;);\nBin bin = new Bin(&amp;quot;DATA&amp;quot;,1);\nBin bbin = new Bin(&amp;quot;tt&amp;quot;,2);\nclient.add(null,key,bin,bbin);\n \n//获取结果\nRecord record = client.get(null,key);\nSystem.out.println(record.toString());\n//(gen:1),(exp:355197871),(bins:(tt:2),(DATA:1))\n//再次执行\n//(gen:2),(exp:355197949),(bins:(tt:4),(DATA:2))\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&#34;对字符类型直接操作\&#34;&gt;对字符类型直接操作&lt;/h3&gt;\n&lt;p&gt;对字符串操作与整数操作类似，对应的方法中所有的bin，在as服务器中必须对字符串类型，否则会抛出异常，可以带其他类型的bin参数，必须保证该bin在as服务器中不存在。&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;对字符串末尾追加操作&lt;br&gt;\n&lt;em&gt;字符串增加后缀&lt;/em&gt;&lt;/li&gt;\n&lt;/ol&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;//在”DATA“的bin值加1，在”tt“的bin值加2\nKey key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;strTest&amp;quot;);\nBin bin = new Bin(&amp;quot;DATA&amp;quot;,&amp;quot;2&amp;quot;);\nBin bbin = new Bin(&amp;quot;tt&amp;quot;,&amp;quot;b&amp;quot;);\nclient.append(null,key,bin,bbin);\n \n//获取结果\nRecord record = client.get(null,key);\nSystem.out.println(record.toString());\n//(gen:1),(exp:355197986),(bins:(tt:b),(DATA:2))\n//将bin的值改为3，bbin的值改为c，再次执行\n//(gen:2),(exp:355198039),(bins:(tt:bc),(DATA:23))\n&lt;/code&gt;&lt;/pre&gt;\n&lt;ol&gt;\n&lt;li&gt;对字符串头部插入操作&lt;br&gt;\n&lt;em&gt;字符串增加前缀&lt;/em&gt;&lt;/li&gt;\n&lt;/ol&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;//在”DATA“的bin值前追加&#39;-&#39;，在”tt”的bin值前追加&#39;-&#39;\nKey key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;strTest&amp;quot;);\nBin bin = new Bin(&amp;quot;DATA&amp;quot;,&amp;quot;-&amp;quot;);\nBin bbin = new Bin(&amp;quot;tt&amp;quot;,&amp;quot;-&amp;quot;);\nclient.prepend(null,key,bin,bbin);\n \n//获取结果\nRecord record = client.get(null,key);\nSystem.out.println(record.toString());\n//再追加key的操作后，执行本操作结果为\n//(gen:3),(exp:355198133),(bins:(tt:-bc),(DATA:-23))\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&#34;touch操作\&#34;&gt;touch操作&lt;/h3&gt;\n&lt;p&gt;用新的写策略更新记录。&lt;br&gt;\n&lt;em&gt;touch更新过期时间&lt;/em&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;123&amp;quot;);\nBin bin = new Bin(&amp;quot;DATA&amp;quot;,&amp;quot;testValue&amp;quot;);\n \nWritePolicy writePolicy = new WritePolicy();\nwritePolicy.expiration=1000;\n \nclient.put(writePolicy,key,bin);\n \nRecord record = client.get(null,key);\nSystem.out.println(record.toString());\nSystem.out.println(record.getTimeToLive());\n//(gen:1),(exp:354107415),(bins:(DATA:testValue))\n//1000\n \nwritePolicy.expiration=100;\nclient.touch(writePolicy,key);\n \nRecord record1 = client.get(null,key);\nSystem.out.println(record1.toString());\nSystem.out.println(record1.getTimeToLive());\n//(gen:2),(exp:354106515),(bins:(DATA:testValue))\n//100\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&#34;operation操作\&#34;&gt;Operation操作&lt;/h3&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;方法&lt;/th&gt;\n&lt;th&gt;说明&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;Operation.get()&lt;/td&gt;\n&lt;td&gt;获取全部bin，一个AsClient.operate()中只能有一个get()，且不能有其他get(String binName)否则会抛异常&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Operation.get(String binName)&lt;/td&gt;\n&lt;td&gt;获取单个bin，一个AsClient.operate()中可以有多个get(String binName)&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Operation.getHeader()&lt;/td&gt;\n&lt;td&gt;只获取除bin外信息&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Operation.put(Bin bin)&lt;/td&gt;\n&lt;td&gt;与AsClient同名方法类似&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Operation.append(Bin bin)&lt;/td&gt;\n&lt;td&gt;与AsClient同名方法类似&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Operation.prepend(Bin bin)&lt;/td&gt;\n&lt;td&gt;与AsClient同名方法类似&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Operation.add(Bin bin)&lt;/td&gt;\n&lt;td&gt;与AsClient同名方法类似&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Operation.touch()&lt;/td&gt;\n&lt;td&gt;touch，一般用于更新过期时间&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;p&gt;&lt;em&gt;touch更新过期时间&lt;/em&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;12345&amp;quot;);\nBin bin = new Bin(&amp;quot;DATA&amp;quot;,1);\nWritePolicy policy = new WritePolicy();\npolicy.expiration=100;\nclient.put(policy,key,bin);\nRecord record = client.get(null,key);\nSystem.out.println(record.getTimeToLive());\n//100\n//更新记录的过期时间，以传入的WritePolicy为准，当前操作传入null则为client中设置的默认写入策略\nclient.operate(null,key, Operation.touch());\nRecord record1 = client.get(null,key);\nSystem.out.println(record1.getTimeToLive());\n//2592000\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;&lt;em&gt;get演示&lt;/em&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;operationTest&amp;quot;);\n \nBin bin = new Bin(&amp;quot;Test&amp;quot;,123);\nBin t = new Bin(&amp;quot;a&amp;quot;,&amp;quot;test&amp;quot;);\n//先放入t，然后获取当前key的record，再放入bin，并再加一个bin\nRecord record = client.operate(null,key,Operation.put(t),Operation.get(),Operation.put(bin),Operation.add(bin));\n//打印的结果中只包含t对应的bin\nSystem.out.println(record.toString());\n//(gen:1),(exp:355198995),(bins:(a:test))\n//获取完整结果\nRecord record1 = client.get(null,key);\nSystem.out.println(record1.toString());\n//(gen:1),(exp:355198995),(bins:(a:test),(Test:246))\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;&lt;em&gt;get(binName)演示&lt;/em&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;operationTest&amp;quot;);\n \nBin bin = new Bin(&amp;quot;Test&amp;quot;,123);\nBin t = new Bin(&amp;quot;a&amp;quot;,&amp;quot;test&amp;quot;);\nRecord record = client.operate(null,key,Operation.put(t),Operation.get(&amp;quot;a&amp;quot;),Operation.put(bin),Operation.get(&amp;quot;Test&amp;quot;),Operation.add(bin));\n \n//输出结果为：包含t，以及Test未自加前的record\nSystem.out.println(record.toString());\n//(gen:1),(exp:355199080),(bins:(a:test),(Test:123))\n//获取完整结果\nRecord record1 = client.get(null,key);\nSystem.out.println(record1.toString());\n//(gen:1),(exp:355199080),(bins:(a:test),(Test:246))\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&#34;listoperation操作\&#34;&gt;ListOperation操作&lt;/h3&gt;\n&lt;p&gt;可以直接操作类型为list的bin。支持负索引，即从末尾开始操作。（index 0）为第一项，（index -1）为倒数第一项。（index 1 ,count 2）为第二和第三项，（index -5 ,count 4）为从倒数第二，第三，第四，第五项。&lt;br&gt;\n如果索引超出列表范围将抛出异常；如果范围部分超出列表范围，则返回有效部分。&lt;/p&gt;\n&lt;h4 id=\&#34;listreturntype\&#34;&gt;ListReturnType&lt;/h4&gt;\n&lt;p&gt;部分方法需要传入标志返回类型的参数。&lt;/p&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;参数&lt;/th&gt;\n&lt;th&gt;说明&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;ListReturnType.NONE&lt;/td&gt;\n&lt;td&gt;不返回任何结果&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListReturnType.INVERTED&lt;/td&gt;\n&lt;td&gt;反选范围，与其他返回类型或连接&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListReturnType.REVERSE_RANK&lt;/td&gt;\n&lt;td&gt;按照排序后的反序索引返回&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListReturnType.RANK&lt;/td&gt;\n&lt;td&gt;按照排序后的顺序索引返回&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListReturnType.REVERSE_INDEX&lt;/td&gt;\n&lt;td&gt;按照索引偏移的反序返回&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListReturnType.INDEX&lt;/td&gt;\n&lt;td&gt;按照索引偏移的顺序返回&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListReturnType.VALUE&lt;/td&gt;\n&lt;td&gt;返回值&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListReturnType.COUNT&lt;/td&gt;\n&lt;td&gt;返回所选的数量&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h4 id=\&#34;查询相关方法\&#34;&gt;查询相关方法&lt;/h4&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;方法&lt;/th&gt;\n&lt;th&gt;说明&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.get(String binName,int index)&lt;/td&gt;\n&lt;td&gt;获取指定索引位置的元素&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.getByIndex(String binName,int index,int returnType)&lt;/td&gt;\n&lt;td&gt;返回指定索引元素的returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.getByIndexRange(String binName,int index,int count,int returnType)&lt;/td&gt;\n&lt;td&gt;返回从指定索引开始count个元素的returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.getByIndexRange(String binName,int index,int returnType)&lt;/td&gt;\n&lt;td&gt;返回指定索引至末尾元素的returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.getByRank(String binName,int rank,int returnType)&lt;/td&gt;\n&lt;td&gt;返回按照元素大小排序后排行第rank个元素的returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.getByRankRange(String binName,int rank,int count,int returnType)&lt;/td&gt;\n&lt;td&gt;返回按照元素大小排序后排行第rank个开始count个元素的returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.getByRankRange(String binName,int rank,int returnType)&lt;/td&gt;\n&lt;td&gt;返回按照元素大小排序后排行第rank个至末尾元素的returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.getByValue(String binName,Value value,int returnType)&lt;/td&gt;\n&lt;td&gt;按照与传入的value相等的元素，返回对应的returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.getByValueList(String binName,List&lt;Value&gt; values,int returnType)&lt;/td&gt;\n&lt;td&gt;按照传入的valueList，返回对应的returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.getByValueRange(String binName,Value valueBegin,Value valueEnd,int returnType)&lt;/td&gt;\n&lt;td&gt;按照指定value范围内(包含头，不包含尾)的元素，返回对应的returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.getByValueRelativeRankRange(String binName,Value value,int rank,int count,int returnType)&lt;/td&gt;\n&lt;td&gt;先对list排序(不影响原顺序)，然后从传入value最近的值开始排行第rank个开始count个元素，返回这些元素的returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.getByValueRelativeRankRange(String binName,Value value,int rank,int returnType)&lt;/td&gt;\n&lt;td&gt;先对list排序(不影响原顺序)，然后从传入value最近的值开始排行第rank个直至末尾，返回这些元素的returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.getRange(String binName,int index)&lt;/td&gt;\n&lt;td&gt;获取指定索引开始到末尾元素&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.getRange(String binName,int index,int count)&lt;/td&gt;\n&lt;td&gt;获取指定索引开始往后count个元素&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.size(String binName)&lt;/td&gt;\n&lt;td&gt;返回list的大小&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h4 id=\&#34;更新相关方法\&#34;&gt;更新相关方法&lt;/h4&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;方法&lt;/th&gt;\n&lt;th&gt;说明&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.set(String binName,int index,Value value)&lt;/td&gt;\n&lt;td&gt;将对应索引位置的元素设置为指定值&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.set(ListPolicy policy,String binName,int index,Value value)&lt;/td&gt;\n&lt;td&gt;更加ListPolicy将对应索引位置的元素设置为指定值&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.append(String binName,Value value)&lt;/td&gt;\n&lt;td&gt;对指定的list类型bin末尾追加元素，并返回长度。&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.append(ListPolicy policy,String binName,Value value)&lt;/td&gt;\n&lt;td&gt;根据ListPolicy对指定的list类型末尾追加元素，并返回长度。&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.appendItems(String binName,List&lt;Value&gt; list)&lt;/td&gt;\n&lt;td&gt;对指定的list类型bin末尾追加多个元素，并返回长度。&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.appendItems(ListPolicy policy,String binName,List&lt;Value&gt; list)&lt;/td&gt;\n&lt;td&gt;根据ListPolicy对指定的list类型末尾追加多个元素，并返回长度。&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.insert(String binName,int index,Value value)&lt;/td&gt;\n&lt;td&gt;在对应bin的指定位置插入元素，并返回长度。&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.insert(ListPolicy policy,String binName,int index,Value value)&lt;/td&gt;\n&lt;td&gt;根据ListPolicy在对应bin的指定位置插入元素，并返回长度。&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.insertItems(String binName,int index,List&lt;Value&gt; list)&lt;/td&gt;\n&lt;td&gt;在对应bin的指定位置插入多个元素，并返回长度。&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.insertItems(ListPolicy policy,String binName,int index,List&lt;Value&gt; list)&lt;/td&gt;\n&lt;td&gt;根据ListPolicy在对应bin的指定位置插入元素，并返回长度。&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.increment(String binName,int index)&lt;/td&gt;\n&lt;td&gt;对指定位置的元素递增1，并返回增长后的值&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.increment(ListPolicy policy,String binName,int index)&lt;/td&gt;\n&lt;td&gt;使用ListPocliy在指定位置的元素递增1，并返回增长后的值&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.increment(String binName,int index,Value value)&lt;/td&gt;\n&lt;td&gt;对指定位置的元素增加传入的值，并返回增长后的值，操作类型必须为数字&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.increment(ListPolicy policy,String binName,int index,Value value)&lt;/td&gt;\n&lt;td&gt;使用ListPocliy对指定位置的元素增加传入的值，并返回增长后的值，操作类型必须为数字&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h4 id=\&#34;删除相关方法\&#34;&gt;删除相关方法&lt;/h4&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;方法&lt;/th&gt;\n&lt;th&gt;说明&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.pop(String binName,int index)&lt;/td&gt;\n&lt;td&gt;将指定位置的元素出列，在bin中删除该元素并返回该元素&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.popRange(String binName,int index,int count)&lt;/td&gt;\n&lt;td&gt;指定下边开始根据count依次出列，返回出列元素&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.popRange(String binName,int index)&lt;/td&gt;\n&lt;td&gt;从指定位置开始直至末尾全部出列，返回出列元素&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.remove(String binName,int index)&lt;/td&gt;\n&lt;td&gt;删除指定索引位置的元素，并返回删除的个数&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.removeRange(String binName,int index,int count)&lt;/td&gt;\n&lt;td&gt;从指定索引开始依次删除count个数的元素，并返回删除的个数&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.removeRange(String binName,int index)&lt;/td&gt;\n&lt;td&gt;删除指定索引到末尾的元素，返回删除的个数&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.trim(String binName,int index,int count)&lt;/td&gt;\n&lt;td&gt;保留指定索引之后count个元素，其余全部删除，返回删除的个数&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.clear(String binName)&lt;/td&gt;\n&lt;td&gt;清空对应bin，默认不返回结果&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.removeByValue(String binName,Value value,int returnType)&lt;/td&gt;\n&lt;td&gt;删除指定值的元素，并根据returnType返回&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.removeByValueList(String binName,List&lt;Value&gt; values,int returnType)&lt;/td&gt;\n&lt;td&gt;批量删除指定值的元素，并根据returnType返回&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.removeByValueRange(String binName,Value valueBegin,Value valueEnd,int returnType)&lt;/td&gt;\n&lt;td&gt;删除指定开始值与结束值之间的元素(含头不含尾)，并根据returnType返回&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.removeByValueRelativeRankRange(String binName,Value value,int rank,int returnType)&lt;/td&gt;\n&lt;td&gt;先对list排序，然后删除传入value最近的值开始排行第rank个直至末尾，返回这些元素的returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.removeByValueRelativeRankRange(String binName,Value value,int rank,int count,int returnType)&lt;/td&gt;\n&lt;td&gt;先对list排序，然后删除传入value最近的值开始排行第rank个开始count个元素，返回这些元素的returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.removeByIndex(String binName,int index,int returnType)&lt;/td&gt;\n&lt;td&gt;删除指定索引的元素，并返回returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.removeByIndexRange(String binName,int index,int returnType)&lt;/td&gt;\n&lt;td&gt;删除指定索引至末尾的元素，并返回returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.removeByIndexRange(String binName,int index,int count,int returnType)&lt;/td&gt;\n&lt;td&gt;删除指定索引后count个元素，并返回returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.removeByRank(String binName,int rank,int returnType)&lt;/td&gt;\n&lt;td&gt;删除根据元素大小排序后第rank个元素，并返回returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.removeByRankRange(String binName,int rank,int returnType)&lt;/td&gt;\n&lt;td&gt;删除根据元素大小排序后第rank个至最后的元素，并返回returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.removeByRankRange(String binName,int rank,int count,int returnType)&lt;/td&gt;\n&lt;td&gt;删除根据元素大小排序后第rank个后count个元素，并返回returnType数据&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h4 id=\&#34;排序相关方法\&#34;&gt;排序相关方法&lt;/h4&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;方法&lt;/th&gt;\n&lt;th&gt;说明&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.setOrder(String binName,ListOrder order)&lt;/td&gt;\n&lt;td&gt;对指定的list类型bin进行排序，返回null。order可选参数：ListOrder.ORDERED（排序）、ListOrder.UNORDERED（未排序，默认）&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ListOperation.sort(String binName,int sortFlags)&lt;/td&gt;\n&lt;td&gt;对指定的list类型bin进行排序，默认不返回结果。sortFlags可选参数：ListSortFlags.DEFAULT（保留重复值）、ListSortFlags.DROP_DUPLICATES（去除重复值）&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;p&gt;&lt;em&gt;示例&lt;/em&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;List&amp;lt;Integer&amp;gt; list = new ArrayList&amp;lt;&amp;gt;();\nlist.add(3);\nlist.add(1);\nlist.add(2);\nKey key = new Key(&amp;quot;ns1&amp;quot;, &amp;quot;test&amp;quot;, &amp;quot;listTest&amp;quot;);\nBin bin = new Bin(&amp;quot;DATA&amp;quot;,list);\nRecord operate = client.operate(null, key, Operation.put(bin), Operation.get());\nSystem.out.println(operate.toString());\n//(gen:1),(exp:367153095),(bins:(DATA:[3, 1, 2]))\n \n//在倒数第一个位置前插入值5，并且获取list的size\nRecord operate1 = client.operate(null, key, ListOperation.insert(&amp;quot;DATA&amp;quot;, -1, Value.get(5)), ListOperation.size(&amp;quot;DATA&amp;quot;));\nSystem.out.println(operate1.toString());\n//(gen:2),(exp:367153095),(bins:(DATA:[4, 4]))\nSystem.out.println(client.get(null,key).toString());\n//(gen:2),(exp:367153095),(bins:(DATA:[3, 1, 5, 2]))\n \n//获取排序后的list并返回对应的值\nSystem.out.println(client.operate(null, key, ListOperation.getByRankRange(&amp;quot;DATA&amp;quot;, 0, ListReturnType.VALUE)).toString());\n//(gen:2),(exp:367153095),(bins:(DATA:[5, 3, 2, 1]))\n  \nSystem.out.println(client.get(null, key).toString());\n//(gen:2),(exp:367153095),(bins:(DATA:[3, 1, 5, 2]))\n//最后一位自增1\nclient.operate(null,key,ListOperation.increment(&amp;quot;DATA&amp;quot;,-1));\nSystem.out.println(client.get(null, key).toString());\n//(gen:3),(exp:367153719),(bins:(DATA:[3, 1, 5, 3]))\n//排序并去除重复值\nSystem.out.println(client.operate(null, key, ListOperation.sort(&amp;quot;DATA&amp;quot;, ListSortFlags.DROP_DUPLICATES)).toString());\n//(gen:4),(exp:367153719),(bins:null)\nSystem.out.println(client.get(null, key).toString());\n//(gen:4),(exp:367153719),(bins:(DATA:[1, 3, 5]))\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&#34;mapoperation操作\&#34;&gt;MapOperation操作&lt;/h3&gt;\n&lt;h4 id=\&#34;mapreturntype\&#34;&gt;MapReturnType&lt;/h4&gt;\n&lt;p&gt;部分方法需要传入返回类型。&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;aerospike-java-client-duan-chang-yong-api&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;用简单的java代码示例去示范Aerospike常用Api操作。&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;Aerospike Java client端常用API&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;Aerospike&#34;,&#34;slug&#34;:&#34;729_jisEs&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://konui.github.io/tag/729_jisEs/&#34;}],&#34;date&#34;:&#34;2022-01-20 14:15:01&#34;,&#34;dateFormat&#34;:&#34;2022-01-20&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://konui.github.io/post/aerospike-java-client-duan-chang-yong-api/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;20 min read&#34;,&#34;time&#34;:1183000,&#34;words&#34;:4219,&#34;minutes&#34;:20},&#34;description&#34;:&#34;用简单的java代码示例去示范Aerospike常用Api操作。\n\n该文档基于以下maven依赖，根据as的官方文档以及依赖中的源码注释整理，只列出常用的操作及策略配置，只涉及功能相关，暂不涉及性能调优。下文代码中client如非特别说明即...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%AE%A2%E6%88%B7%E7%AB%AF\&#34;&gt;客户端&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%90%8C%E6%AD%A5%E5%AE%A2%E6%88%B7%E7%AB%AF%E5%88%9D%E5%A7%8B%E5%8C%96\&#34;&gt;同步客户端初始化&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%BC%82%E6%AD%A5%E5%AE%A2%E6%88%B7%E7%AB%AF%E5%88%9D%E5%A7%8B%E5%8C%96\&#34;&gt;异步客户端初始化&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%9B%B4%E6%96%B0%E6%93%8D%E4%BD%9C\&#34;&gt;更新操作&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%99%AE%E9%80%9A%E7%B1%BB%E5%9E%8B%E5%86%99%E5%85%A5\&#34;&gt;普通类型写入&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%A4%8D%E6%9D%82%E7%B1%BB%
