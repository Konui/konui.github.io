<script>

  let sideBarOpen = 'sidebar-open';
  let body = document.body;
  let back2Top = document.querySelector('#back_to_top'),
  back2TopText = document.querySelector('#back_to_top_text'),
  drawerBox = document.querySelector('#drawer_box'),
  rightSideBar = document.querySelector('.sidebar'),
  viewport = document.querySelector('body');

  function scrollAnimation(currentY, targetY) {
   
    let needScrollTop = targetY - currentY
    let _currentY = currentY
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10)
      _currentY += dist
      window.scrollTo(_currentY, currentY)
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY)
      } else {
        window.scrollTo(_currentY, targetY)
      }
    }, 1)
  }

  back2Top.addEventListener("click", function(e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });
  
  window.addEventListener('scroll', function(e) {
    let percent = document.scrollingElement.scrollTop / (document.scrollingElement.scrollHeight - document.scrollingElement.clientHeight) * 100;
    if (percent > 1 && !back2Top.classList.contains('back-top-active')) {
      back2Top.classList.add('back-top-active');
    }
    if (percent == 0) {
      back2Top.classList.remove('back-top-active');
    }
    if (back2TopText) {
      back2TopText.textContent = Math.floor(percent);
    }
  });

  
  let hasCacu = false;
  window.onresize = function() {
    if (window.width > 991) {
      calcuHeight();
    } else {
      hasCacu = false;
    }
  }

  function calcuHeight() {
    // 动态调整站点概览高度
    if (!hasCacu && back2Top.classList.contains('pisces') || back2Top.classList.contains('gemini')) {
      let sideBar = document.querySelector('.sidebar');
      let navUl = document.querySelector('#site_nav');
      sideBar.style = 'margin-top:' + (navUl.offsetHeight + navUl.offsetTop + 15) + 'px;';
      hasCacu = true;
    }
  }
  calcuHeight();
  
  let open = false, MOTION_TIME = 300, RIGHT_MOVE_DIS = '320px';

  if (drawerBox) {
    let rightMotions = document.querySelectorAll('.right-motion');
    let right = drawerBox.classList.contains('right');

    let transitionDir = right ? "transition.slideRightIn" : "transition.slideLeftIn";

    let openProp, closeProp;
    if (right) {
      openProp = {
        paddingRight: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingRight: '0px'
      };
    } else {
      openProp = {
        paddingLeft: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingLeft: '0px'
      };
    }

    drawerBox.onclick = function() {
      open = !open;
      window.Velocity(rightSideBar, 'stop');
      window.Velocity(viewport, 'stop');
      window.Velocity(rightMotions, 'stop');
      if (open) {
        window.Velocity(rightSideBar, {
          width: RIGHT_MOVE_DIS
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, transitionDir,{ });
          }
        })
        window.Velocity(viewport, openProp,{
          duration: MOTION_TIME
        });
      } else {
        window.Velocity(rightSideBar, {
          width: '0px'
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, {
              opacity: 0
            });
          }
        })
        window.Velocity(viewport, closeProp ,{
          duration: MOTION_TIME
        });
      }
      for (let i = 0; i < drawerBox.children.length; i++) {
        drawerBox.children[i].classList.toggle('muse-line');
      }
      drawerBox.classList.toggle(sideBarOpen);
    }
  }

  // 链接跳转
  let newWindow = 'false'

    let links = document.querySelectorAll('.post-body a')
    links.forEach(item => {
      if (!item.classList.contains('btn')) {
        item.setAttribute("target","_blank");
      }
    })
  }
  // 代码高亮
  hljs.initHighlightingOnLoad();

<script>
  //拿来主义(真香)^_^，Clipboard 实现摘自掘金 https://juejin.im/post/5aefeb6e6fb9a07aa43c20af
  window.Clipboard = (function (window, document, navigator) {
    var textArea,
      copy;

    // 判断是不是ios端
    function isOS() {
      return navigator.userAgent.match(/ipad|iphone/i);
    }
    //创建文本元素
    function createTextArea(text) {
      textArea = document.createElement('textArea');
      textArea.value = text;
      textArea.style.width = 0;
      textArea.style.height = 0;
      textArea.clientHeight = 0;
      textArea.clientWidth = 0;
      document.body.appendChild(textArea);
    }
    //选择内容
    function selectText() {
      var range,
        selection;

      if (isOS()) {
        range = document.createRange();
        range.selectNodeContents(textArea);
        selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textArea.setSelectionRange(0, 999999);
      } else {
        textArea.select();
      }
    }

    //复制到剪贴板
    function copyToClipboard() {
      try {
        document.execCommand("Copy")
      } catch (err) {
        alert("复制错误！请手动复制！")
      }
      document.body.removeChild(textArea);
    }

    copy = function (text) {
      createTextArea(text);
      selectText();
      copyToClipboard();
    };

    return {
      copy: copy
    };
  })(window, document, navigator);

  function copyCode(e) {
    if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
      let code = e.currentTarget.querySelector('code');
      var text = code.innerText;
      if (e.srcElement.textContent === '复制成功') {
        console.log('复制操作频率过高');
        return;
      }
      e.srcElement.textContent = '复制成功';
      (function (elem) {
        setTimeout(() => {
          if (elem.textContent === '复制成功') {
            elem.textContent = '复制代码'
          }
        }, 1000);
      })(e.srcElement)
      Clipboard.copy(text);
    }
  }

  let pres = document.querySelectorAll('pre');
  pres.forEach(pre => {
    let code = pre.querySelector('code');
    let copyElem = document.createElement('span');
    copyElem.classList.add('copy-code');
    copyElem.textContent = '复制代码';
    pre.appendChild(copyElem);
    pre.onclick = copyCode
  })
</script>

&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;List&amp;lt;String&amp;gt; list = new ArrayList&amp;lt;&amp;gt;();
list.add(&amp;quot;a1&amp;quot;);
list.add(&amp;quot;b2&amp;quot;);
list.add(&amp;quot;c3&amp;quot;);
 
Map&amp;lt;String,String&amp;gt; map = new HashMap&amp;lt;&amp;gt;();
map.put(&amp;quot;a&amp;quot;,&amp;quot;11&amp;quot;);
map.put(&amp;quot;b&amp;quot;,&amp;quot;22&amp;quot;);
map.put(&amp;quot;c&amp;quot;,&amp;quot;33&amp;quot;);
 
Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;listAndMap&amp;quot;);
Bin listBin = new Bin(&amp;quot;listBin&amp;quot;,list);
//Bin listBin1 = new Bin(&amp;quot;listBin&amp;quot;,Value.get(list));  //与上方代码同效
Bin mapBin = new Bin(&amp;quot;mapBin&amp;quot;,map);
//Bin mapBin1 = new Bin(&amp;quot;mapBin&amp;quot;,Value.get(map));   //与上方代码同效
 
client.put(null,key,listBin,mapBin);
 
//获取结果
Record record = client.get(null,key);
System.out.println(record.toString());
//(gen:1),(exp:355197723),(bins:(mapBin:{a=11, b=22, c=33}),(listBin:[a1, b2, c3]))
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;使用写入策略&#34;&gt;使用写入策略&lt;/h3&gt;
&lt;p&gt;写入策略的具体配置见常用策略配置段落。&lt;br&gt;
&lt;em&gt;写入策略-过期时间&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;writePolicy&amp;quot;);
Bin bin = new Bin(&amp;quot;testBin&amp;quot;,&amp;quot;test&amp;quot;);
 
WritePolicy writePolicy = new WritePolicy();
//设置10s后过期
writePolicy.expiration=10;
//设置仅创建记录，如果记录存在则会抛异常
writePolicy.recordExistsAction = RecordExistsAction.CREATE_ONLY;
 
client.put(writePolicy,key,bin);
 
//获取结果
Record record = client.get(null,key);
System.out.println(record.toString());
System.out.println(record.getTimeToLive());
//(gen:1),(exp:352605790),(bins:(testBin:test))
//10
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;em&gt;写入策略-版本&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;test&amp;quot;);
Bin bin = new Bin(&amp;quot;DATA&amp;quot;,0);
 
client.put(null,key,bin);
 
Record record = client.get(null,key);
System.out.println(record.toString());
//(gen:1),(exp:367148323),(bins:(DATA:0))
 
WritePolicy writePolicy = new WritePolicy();
writePolicy.generation = record.generation;
writePolicy.generationPolicy = GenerationPolicy.EXPECT_GEN_EQUAL;
 
client.put(writePolicy,key,bin);
Record record1 = client.get(null,key);
System.out.println(record1.toString());
//(gen:2),(exp:367148323),(bins:(DATA:0))
 
client.put(writePolicy,key,bin);
Record record2 = client.get(null,key);
System.out.println(record2.toString());
//Exception in thread &amp;quot;main&amp;quot; com.aerospike.client.AerospikeException: Error Code 3: Generation error
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;异步写入&#34;&gt;异步写入&lt;/h3&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;//不能直接使用同步的client，初始化一个异步的client
//创建EventLoops
EventPolicy eventPolicy = new EventPolicy();
EventLoops eventLoops = new NioEventLoops(eventPolicy,4);
 
//初始化异步as客户端需要指定EventLoops
ClientPolicy clientPolicy = new ClientPolicy();
clientPolicy.eventLoops=eventLoops;
 
AerospikeClient aerospikeClient = new AerospikeClient(clientPolicy,&amp;quot;47.98.237.128&amp;quot;,3000);
 
 
//开始准备异步写入
EventLoop eventLoop = eventLoops.next();
 
WriteListener writeListener = new WriteListener() {
    @Override
    public void onSuccess(Key key) {
        System.out.println(&amp;quot;写入成功&amp;quot;);
        System.out.println(key.toString());
    }
     
    @Override
    public void onFailure(AerospikeException exception) {
        System.out.println(&amp;quot;写入异常&amp;quot;);
        System.out.println(exception.toString());
    }
};
Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test_async&amp;quot;);
Bin bin = new Bin(&amp;quot;test&amp;quot;,&amp;quot;test_async&amp;quot;);
aerospikeClient.put(eventLoop, writeListener,null,key,bin);
 
TimeUnit.SECONDS.sleep(5);
 
client.close();
eventLoops.close();
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;对整数类型bin直接操作&#34;&gt;对整数类型bin直接操作&lt;/h3&gt;
&lt;p&gt;该操作会把add方法参数中，bin名相同的加到服务器中的bin值中。add方法只能操作整数类型。&lt;br&gt;
add方法中的所有bin对应服务器中的类型必须为整数类型， 如果有一个bin不为整数类型会抛出异常。&lt;br&gt;
add中可含有其他类型bin，必须服务器中不存在该bin才可正常写入。&lt;br&gt;
&lt;em&gt;add操作&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;//在”DATA“的bin值加1，在”tt“的bin值加2
Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;123&amp;quot;);
Bin bin = new Bin(&amp;quot;DATA&amp;quot;,1);
Bin bbin = new Bin(&amp;quot;tt&amp;quot;,2);
client.add(null,key,bin,bbin);
 
//获取结果
Record record = client.get(null,key);
System.out.println(record.toString());
//(gen:1),(exp:355197871),(bins:(tt:2),(DATA:1))
//再次执行
//(gen:2),(exp:355197949),(bins:(tt:4),(DATA:2))
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;对字符类型直接操作&#34;&gt;对字符类型直接操作&lt;/h3&gt;
&lt;p&gt;对字符串操作与整数操作类似，对应的方法中所有的bin，在as服务器中必须对字符串类型，否则会抛出异常，可以带其他类型的bin参数，必须保证该bin在as服务器中不存在。&lt;/p&gt;
&lt;ol&gt;
&lt;li&gt;对字符串末尾追加操作&lt;br&gt;
&lt;em&gt;字符串增加后缀&lt;/em&gt;&lt;/li&gt;
&lt;/ol&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;//在”DATA“的bin值加1，在”tt“的bin值加2
Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;strTest&amp;quot;);
Bin bin = new Bin(&amp;quot;DATA&amp;quot;,&amp;quot;2&amp;quot;);
Bin bbin = new Bin(&amp;quot;tt&amp;quot;,&amp;quot;b&amp;quot;);
client.append(null,key,bin,bbin);
 
//获取结果
Record record = client.get(null,key);
System.out.println(record.toString());
//(gen:1),(exp:355197986),(bins:(tt:b),(DATA:2))
//将bin的值改为3，bbin的值改为c，再次执行
//(gen:2),(exp:355198039),(bins:(tt:bc),(DATA:23))
&lt;/code&gt;&lt;/pre&gt;
&lt;ol&gt;
&lt;li&gt;对字符串头部插入操作&lt;br&gt;
&lt;em&gt;字符串增加前缀&lt;/em&gt;&lt;/li&gt;
&lt;/ol&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;//在”DATA“的bin值前追加&#39;-&#39;，在”tt”的bin值前追加&#39;-&#39;
Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;strTest&amp;quot;);
Bin bin = new Bin(&amp;quot;DATA&amp;quot;,&amp;quot;-&amp;quot;);
Bin bbin = new Bin(&amp;quot;tt&amp;quot;,&amp;quot;-&amp;quot;);
client.prepend(null,key,bin,bbin);
 
//获取结果
Record record = client.get(null,key);
System.out.println(record.toString());
//再追加key的操作后，执行本操作结果为
//(gen:3),(exp:355198133),(bins:(tt:-bc),(DATA:-23))
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;touch操作&#34;&gt;touch操作&lt;/h3&gt;
&lt;p&gt;用新的写策略更新记录。&lt;br&gt;
&lt;em&gt;touch更新过期时间&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;123&amp;quot;);
Bin bin = new Bin(&amp;quot;DATA&amp;quot;,&amp;quot;testValue&amp;quot;);
 
WritePolicy writePolicy = new WritePolicy();
writePolicy.expiration=1000;
 
client.put(writePolicy,key,bin);
 
Record record = client.get(null,key);
System.out.println(record.toString());
System.out.println(record.getTimeToLive());
//(gen:1),(exp:354107415),(bins:(DATA:testValue))
//1000
 
writePolicy.expiration=100;
client.touch(writePolicy,key);
 
Record record1 = client.get(null,key);
System.out.println(record1.toString());
System.out.println(record1.getTimeToLive());
//(gen:2),(exp:354106515),(bins:(DATA:testValue))
//100
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;operation操作&#34;&gt;Operation操作&lt;/h3&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;方法&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;Operation.get()&lt;/td&gt;
&lt;td&gt;获取全部bin，一个AsClient.operate()中只能有一个get()，且不能有其他get(String binName)否则会抛异常&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Operation.get(String binName)&lt;/td&gt;
&lt;td&gt;获取单个bin，一个AsClient.operate()中可以有多个get(String binName)&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Operation.getHeader()&lt;/td&gt;
&lt;td&gt;只获取除bin外信息&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Operation.put(Bin bin)&lt;/td&gt;
&lt;td&gt;与AsClient同名方法类似&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Operation.append(Bin bin)&lt;/td&gt;
&lt;td&gt;与AsClient同名方法类似&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Operation.prepend(Bin bin)&lt;/td&gt;
&lt;td&gt;与AsClient同名方法类似&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Operation.add(Bin bin)&lt;/td&gt;
&lt;td&gt;与AsClient同名方法类似&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Operation.touch()&lt;/td&gt;
&lt;td&gt;touch，一般用于更新过期时间&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;p&gt;&lt;em&gt;touch更新过期时间&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;12345&amp;quot;);
Bin bin = new Bin(&amp;quot;DATA&amp;quot;,1);
WritePolicy policy = new WritePolicy();
policy.expiration=100;
client.put(policy,key,bin);
Record record = client.get(null,key);
System.out.println(record.getTimeToLive());
//100
//更新记录的过期时间，以传入的WritePolicy为准，当前操作传入null则为client中设置的默认写入策略
client.operate(null,key, Operation.touch());
Record record1 = client.get(null,key);
System.out.println(record1.getTimeToLive());
//2592000
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;em&gt;get演示&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;operationTest&amp;quot;);
 
Bin bin = new Bin(&amp;quot;Test&amp;quot;,123);
Bin t = new Bin(&amp;quot;a&amp;quot;,&amp;quot;test&amp;quot;);
//先放入t，然后获取当前key的record，再放入bin，并再加一个bin
Record record = client.operate(null,key,Operation.put(t),Operation.get(),Operation.put(bin),Operation.add(bin));
//打印的结果中只包含t对应的bin
System.out.println(record.toString());
//(gen:1),(exp:355198995),(bins:(a:test))
//获取完整结果
Record record1 = client.get(null,key);
System.out.println(record1.toString());
//(gen:1),(exp:355198995),(bins:(a:test),(Test:246))
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;em&gt;get(binName)演示&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;operationTest&amp;quot;);
 
Bin bin = new Bin(&amp;quot;Test&amp;quot;,123);
Bin t = new Bin(&amp;quot;a&amp;quot;,&amp;quot;test&amp;quot;);
Record record = client.operate(null,key,Operation.put(t),Operation.get(&amp;quot;a&amp;quot;),Operation.put(bin),Operation.get(&amp;quot;Test&amp;quot;),Operation.add(bin));
 
//输出结果为：包含t，以及Test未自加前的record
System.out.println(record.toString());
//(gen:1),(exp:355199080),(bins:(a:test),(Test:123))
//获取完整结果
Record record1 = client.get(null,key);
System.out.println(record1.toString());
//(gen:1),(exp:355199080),(bins:(a:test),(Test:246))
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;listoperation操作&#34;&gt;ListOperation操作&lt;/h3&gt;
&lt;p&gt;可以直接操作类型为list的bin。支持负索引，即从末尾开始操作。（index 0）为第一项，（index -1）为倒数第一项。（index 1 ,count 2）为第二和第三项，（index -5 ,count 4）为从倒数第二，第三，第四，第五项。&lt;br&gt;
如果索引超出列表范围将抛出异常；如果范围部分超出列表范围，则返回有效部分。&lt;/p&gt;
&lt;h4 id=&#34;listreturntype&#34;&gt;ListReturnType&lt;/h4&gt;
&lt;p&gt;部分方法需要传入标志返回类型的参数。&lt;/p&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;参数&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;ListReturnType.NONE&lt;/td&gt;
&lt;td&gt;不返回任何结果&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListReturnType.INVERTED&lt;/td&gt;
&lt;td&gt;反选范围，与其他返回类型或连接&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListReturnType.REVERSE_RANK&lt;/td&gt;
&lt;td&gt;按照排序后的反序索引返回&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListReturnType.RANK&lt;/td&gt;
&lt;td&gt;按照排序后的顺序索引返回&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListReturnType.REVERSE_INDEX&lt;/td&gt;
&lt;td&gt;按照索引偏移的反序返回&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListReturnType.INDEX&lt;/td&gt;
&lt;td&gt;按照索引偏移的顺序返回&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListReturnType.VALUE&lt;/td&gt;
&lt;td&gt;返回值&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListReturnType.COUNT&lt;/td&gt;
&lt;td&gt;返回所选的数量&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h4 id=&#34;查询相关方法&#34;&gt;查询相关方法&lt;/h4&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;方法&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.get(String binName,int index)&lt;/td&gt;
&lt;td&gt;获取指定索引位置的元素&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByIndex(String binName,int index,int returnType)&lt;/td&gt;
&lt;td&gt;返回指定索引元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByIndexRange(String binName,int index,int count,int returnType)&lt;/td&gt;
&lt;td&gt;返回从指定索引开始count个元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByIndexRange(String binName,int index,int returnType)&lt;/td&gt;
&lt;td&gt;返回指定索引至末尾元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByRank(String binName,int rank,int returnType)&lt;/td&gt;
&lt;td&gt;返回按照元素大小排序后排行第rank个元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByRankRange(String binName,int rank,int count,int returnType)&lt;/td&gt;
&lt;td&gt;返回按照元素大小排序后排行第rank个开始count个元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByRankRange(String binName,int rank,int returnType)&lt;/td&gt;
&lt;td&gt;返回按照元素大小排序后排行第rank个至末尾元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByValue(String binName,Value value,int returnType)&lt;/td&gt;
&lt;td&gt;按照与传入的value相等的元素，返回对应的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByValueList(String binName,List&lt;Value&gt; values,int returnType)&lt;/td&gt;
&lt;td&gt;按照传入的valueList，返回对应的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByValueRange(String binName,Value valueBegin,Value valueEnd,int returnType)&lt;/td&gt;
&lt;td&gt;按照指定value范围内(包含头，不包含尾)的元素，返回对应的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByValueRelativeRankRange(String binName,Value value,int rank,int count,int returnType)&lt;/td&gt;
&lt;td&gt;先对list排序(不影响原顺序)，然后从传入value最近的值开始排行第rank个开始count个元素，返回这些元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getByValueRelativeRankRange(String binName,Value value,int rank,int returnType)&lt;/td&gt;
&lt;td&gt;先对list排序(不影响原顺序)，然后从传入value最近的值开始排行第rank个直至末尾，返回这些元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getRange(String binName,int index)&lt;/td&gt;
&lt;td&gt;获取指定索引开始到末尾元素&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.getRange(String binName,int index,int count)&lt;/td&gt;
&lt;td&gt;获取指定索引开始往后count个元素&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.size(String binName)&lt;/td&gt;
&lt;td&gt;返回list的大小&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h4 id=&#34;更新相关方法&#34;&gt;更新相关方法&lt;/h4&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;方法&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.set(String binName,int index,Value value)&lt;/td&gt;
&lt;td&gt;将对应索引位置的元素设置为指定值&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.set(ListPolicy policy,String binName,int index,Value value)&lt;/td&gt;
&lt;td&gt;更加ListPolicy将对应索引位置的元素设置为指定值&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.append(String binName,Value value)&lt;/td&gt;
&lt;td&gt;对指定的list类型bin末尾追加元素，并返回长度。&lt;/td&gt;
&lt;/tr&gt;

&lt;h4 id=&#34;排序相关方法&#34;&gt;排序相关方法&lt;/h4&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;方法&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.setOrder(String binName,ListOrder order)&lt;/td&gt;
&lt;td&gt;对指定的list类型bin进行排序，返回null。order可选参数：ListOrder.ORDERED（排序）、ListOrder.UNORDERED（未排序，默认）&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListOperation.sort(String binName,int sortFlags)&lt;/td&gt;
&lt;td&gt;对指定的list类型bin进行排序，默认不返回结果。sortFlags可选参数：ListSortFlags.DEFAULT（保留重复值）、ListSortFlags.DROP_DUPLICATES（去除重复值）&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;p&gt;&lt;em&gt;示例&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;List&amp;lt;Integer&amp;gt; list = new ArrayList&amp;lt;&amp;gt;();
list.add(3);
list.add(1);
list.add(2);
Key key = new Key(&amp;quot;ns1&amp;quot;, &amp;quot;test&amp;quot;, &amp;quot;listTest&amp;quot;);
Bin bin = new Bin(&amp;quot;DATA&amp;quot;,list);
Record operate = client.operate(null, key, Operation.put(bin), Operation.get());
System.out.println(operate.toString());
//(gen:1),(exp:367153095),(bins:(DATA:[3, 1, 2]))
 
//在倒数第一个位置前插入值5，并且获取list的size
Record operate1 = client.operate(null, key, ListOperation.insert(&amp;quot;DATA&amp;quot;, -1, Value.get(5)), ListOperation.size(&amp;quot;DATA&amp;quot;));
System.out.println(operate1.toString());
//(gen:2),(exp:367153095),(bins:(DATA:[4, 4]))
System.out.println(client.get(null,key).toString());
//(gen:2),(exp:367153095),(bins:(DATA:[3, 1, 5, 2]))
 
//获取排序后的list并返回对应的值
System.out.println(client.operate(null, key, ListOperation.getByRankRange(&amp;quot;DATA&amp;quot;, 0, ListReturnType.VALUE)).toString());
//(gen:2),(exp:367153095),(bins:(DATA:[5, 3, 2, 1]))
  
System.out.println(client.get(null, key).toString());
//(gen:2),(exp:367153095),(bins:(DATA:[3, 1, 5, 2]))
//最后一位自增1
client.operate(null,key,ListOperation.increment(&amp;quot;DATA&amp;quot;,-1));
System.out.println(client.get(null, key).toString());
//(gen:3),(exp:367153719),(bins:(DATA:[3, 1, 5, 3]))
//排序并去除重复值
System.out.println(client.operate(null, key, ListOperation.sort(&amp;quot;DATA&amp;quot;, ListSortFlags.DROP_DUPLICATES)).toString());
//(gen:4),(exp:367153719),(bins:null)
System.out.println(client.get(null, key).toString());
//(gen:4),(exp:367153719),(bins:(DATA:[1, 3, 5]))
&lt;/code&gt;&lt;/pre&gt;

&lt;td&gt;删除指定值的元素，并根据returnType返回被删除元素&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapOperation.removeByValueList(String binName,List&lt;Value&gt; values int returnType)&lt;/td&gt;
&lt;td&gt;批量删除指定值的元素，并根据returnType返回被删除元素&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapOperation.removeByValueRange(String binName,Value valueBegin,Value valueEnd,int returnType)&lt;/td&gt;
&lt;td&gt;删除指定value范围(含头不含尾)内的元素，并根据returnType返回被删除元素&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapOperation.removeByValueRelativeRankRange(String binName,Value value,int rank,int returnType)&lt;/td&gt;
&lt;td&gt;先根据value排序然后删除从距离指定value最近的元素后index元素开始直至末尾，返回这些元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapOperation.removeByValueRelativeRankRange(String binName,Value value,int rank,int count,int returnType)&lt;/td&gt;
&lt;td&gt;先根据value排序然后删除从距离指定value最近的元素后index元素开始count个元素，返回这些元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapOperation.removeByIndex(String binName,int index,int returnType)&lt;/td&gt;
&lt;td&gt;删除指定索引位置的元素，并根据returnType返回删除元素&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapOperation.removeByIndexRange(String binName,int index,int returnType)&lt;/td&gt;
&lt;td&gt;删除指定索引位置至末尾的元素，并根据returnType返回删除元素&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapOperation.removeByIndexRange(String binName,int index,int count,int returnType)&lt;/td&gt;
&lt;td&gt;删除指定索引位置开始，后count个元素，并根据returnType返回删除元素&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapOperation.removeByRank(String binName,int rank,int returnType)&lt;/td&gt;
&lt;td&gt;删除排序后第rank位置元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapOperation.removeByRankRange(String binName,int rank,int returnType)&lt;/td&gt;
&lt;td&gt;删除排序后第rank位置元素开始直至末尾元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapOperation.removeByRankRange(String binName,int rank,int count,int returnType)&lt;/td&gt;
&lt;td&gt;删除排序后第rank位置元素开始，后count个元素的returnType数据&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h3 id=&#34;删除&#34;&gt;删除&lt;/h3&gt;
&lt;p&gt;&lt;strong&gt;删除操作中，client.delete()与client.truncate()方法并没有真正删除硬盘中的数据，所以重启后会导致这些记录重新被加载。具体见(as社区中的文档)[https://discuss.aerospike.com/t/issues-with-cold-start-resurrecting-deleted-records/3930]。&lt;/strong&gt;&lt;br&gt;
但因过期时间而被驱逐的记录不会出现此现象。&lt;br&gt;
所以，单条记录删除可以将其过期时间设置为1；多记录删除应该使用lua脚本批量设置过期时间为1（直接用java端扫描再设置过期时间效率较低）。&lt;/p&gt;
&lt;h4 id=&#34;删除bin&#34;&gt;删除bin&lt;/h4&gt;
&lt;p&gt;用Value.getAsNull()的值去覆盖要写入的bin，即可删除bin。要操作的记录不存在会抛出异常。&lt;br&gt;
当该记录所有bin都被删除后，该记录也会被删除。但和delete与truncate一样，重启后会出现已经被删除的记录，出现的记录为删除操作前的状态。&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;123&amp;quot;);
 
Bin bin1 = new Bin(&amp;quot;DATA1&amp;quot;,&amp;quot;123&amp;quot;);
Bin bin2 = new Bin(&amp;quot;DATA2&amp;quot;,&amp;quot;321&amp;quot;);
 
client.put(null,key,bin1,bin2);
 
Record record1 = client.get(null,key);
System.out.println(record1.toString());
//(gen:1),(exp:355634387),(bins:(DATA2:321),(DATA1:123))
 
//删除名为&amp;quot;DATA2&amp;quot;的bin
Bin bin3 = new Bin(&amp;quot;DATA2&amp;quot;, Value.getAsNull());
client.put(null,key,bin3);
 
Record record2 = client.get(null,key);
System.out.println(record2.toString());
//(gen:2),(exp:355634387),(bins:(DATA1:123))
&lt;/code&gt;&lt;/pre&gt;
&lt;h4 id=&#34;删除key&#34;&gt;删除key&lt;/h4&gt;
&lt;p&gt;&lt;em&gt;直接删除&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;123&amp;quot;);
//该方法删除的记录可能会在重启后出现
client.delete(null,key);
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;em&gt;用过期时间驱逐key&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;123&amp;quot;);
WritePolicy policy = new WritePolicy();
policy.expiration=1;
client.touch(policy,key);
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;查询&#34;&gt;查询&lt;/h2&gt;
&lt;h3 id=&#34;根据key查询&#34;&gt;根据key查询&lt;/h3&gt;
&lt;h4 id=&#34;get&#34;&gt;get&lt;/h4&gt;
&lt;p&gt;查询记录&lt;br&gt;
批量查询时可以用Key[]数组或者传入BatchRead的list集合。&lt;br&gt;
&lt;em&gt;get-单记录&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;ky1&amp;quot;);
Bin bin1 = new Bin(&amp;quot;b1&amp;quot;,&amp;quot;abc&amp;quot;);
Bin bin2 = new Bin(&amp;quot;b2&amp;quot;,&amp;quot;def&amp;quot;);
Bin bin3 = new Bin(&amp;quot;b3&amp;quot;,123);
client.put(null,key,bin1,bin2,bin3);
 
//获取所有bin
Record record = client.get(null, key);
System.out.println(record.toString());
//(gen:1),(exp:367149831),(bins:(b2:def),(b3:123),(b1:abc))
 
//获取指定bin
Record record1 = client.get(null, key, &amp;quot;b1&amp;quot;, &amp;quot;b2&amp;quot;);
System.out.println(record1.toString());
//(gen:1),(exp:367149831),(bins:(b2:def),(b1:abc))
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;em&gt;get-多记录&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key1 = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;bt1&amp;quot;);
Bin bin1 = new Bin(&amp;quot;DATA&amp;quot;,1);
Bin b1 = new Bin(&amp;quot;z&amp;quot;,1);
client.put(null,key1,bin1,b1);
 
Key key2 = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;bt2&amp;quot;);
Bin bin2 = new Bin(&amp;quot;DATA&amp;quot;,2);
client.put(null,key2,bin2);
 
Key key3 = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;bt3&amp;quot;);
Bin bin3 = new Bin(&amp;quot;DATA&amp;quot;,3);
client.put(null,key3,bin3);
 
//获取所有bin
Key[] keys = new Key[]{key1,key2,key3};
Record[] records = client.get(null, keys);
for (int i = 0; i &amp;lt; records.length; i++) {
    System.out.print(records[i].toString()+&amp;quot;\t&amp;quot;);
}
System.out.println();
//(gen:3),(exp:367150918),(bins:(DATA:1),(z:1)) (gen:3),(exp:367150918),(bins:(DATA:2)) (gen:3),(exp:367150918),(bins:(DATA:3))
 
//获取指定bin
Record[] records1 = client.get(null, keys, &amp;quot;z&amp;quot;);
for (int i = 0; i &amp;lt; records1.length; i++) {
    System.out.print(records1[i].toString()+&amp;quot;\t&amp;quot;);
}
System.out.println();
//(gen:3),(exp:367150918),(bins:(z:1))  (gen:3),(exp:367150918),(bins:null) (gen:3),(exp:367150918),(bins:null)
  
//根据key指定不同的bin
List&amp;lt;BatchRead&amp;gt; list = new ArrayList&amp;lt;&amp;gt;();
BatchRead batchRead1 = new BatchRead(key1, true);
list.add(batchRead1);
list.add(new BatchRead(key2,new String[]{&amp;quot;DATA&amp;quot;,&amp;quot;z&amp;quot;}));
list.add(new BatchRead(key3,new String[]{&amp;quot;z&amp;quot;}));
client.get(null,list);
 
list.forEach(batchRead -&amp;gt;{
    System.out.println(batchRead.record.toString());
});
//(gen:3),(exp:367150918),(bins:(DATA:1),(z:1))
//(gen:3),(exp:367150918),(bins:(DATA:2))
//(gen:3),(exp:367150918),(bins:null)
&lt;/code&gt;&lt;/pre&gt;
&lt;h4 id=&#34;getheader&#34;&gt;getHeader&lt;/h4&gt;
&lt;p&gt;获取记录头信息，不返回bin&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key1 = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;bt1&amp;quot;);
Bin bin1 = new Bin(&amp;quot;DATA&amp;quot;,1);
Bin b1 = new Bin(&amp;quot;z&amp;quot;,1);
client.put(null,key1,bin1,b1);
 
Key key2 = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;bt2&amp;quot;);
Bin bin2 = new Bin(&amp;quot;DATA&amp;quot;,2);
client.put(null,key2,bin2);
 
//单个获取
Record header = client.getHeader(null, key1);
System.out.println(header.toString());
//(gen:6),(exp:367151278),(bins:null)
  
//批量获取
Record[] header1 = client.getHeader(null, new Key[]{key1, key2});
for (int i = 0; i &amp;lt; header1.length; i++) {
    System.out.println(header1[i].toString());
}
//(gen:6),(exp:367151278),(bins:null)
//(gen:5),(exp:367151278),(bins:null)
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;记录查询-扫描&#34;&gt;记录查询、扫描&lt;/h3&gt;
&lt;p&gt;&lt;strong&gt;query和scan的方法只会处理client初始化时连接的节点上所管的主分区记录，不会处理副本分区记录，如果client没有连接全部的as集群节点会出现记录数少于实际记录数情况，具体见常见问题1。&lt;/strong&gt;&lt;br&gt;
&lt;strong&gt;例如有三台as集群其中一个set中100条记录，as client初始化时只连接其中两台，调用该方法扫描该set可能只会返回70，而不是100。&lt;/strong&gt;&lt;/p&gt;
&lt;h4 id=&#34;query&#34;&gt;query&lt;/h4&gt;
&lt;p&gt;query查询可以根据条件对set进行查询。&lt;br&gt;
条件的拼接需要用后缀表达式的形式。PredExp用法见下文&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Statement statement = new Statement();
statement.setNamespace(&amp;quot;ns1&amp;quot;);
statement.setSetName(&amp;quot;test&amp;quot;);
//结果只返回bin1，bin2，如果不设置则全部返回
statement.setBinNames(&amp;quot;bin1&amp;quot;,&amp;quot;bin2&amp;quot;);
statement.setPredExp(
        //bin1的int值小于8
        PredExp.integerBin(&amp;quot;bin1&amp;quot;),
        PredExp.integerValue(8),
        PredExp.integerLess(),
 
        //bin2符合正则表达式&amp;quot;a:&amp;quot;
        PredExp.stringBin(&amp;quot;bin2&amp;quot;),
        PredExp.stringValue(&amp;quot;a:&amp;quot;),
        PredExp.stringRegex(0),
 
        //bin2符合正则表达式&amp;quot;s$&amp;quot;
        PredExp.stringBin(&amp;quot;bin2&amp;quot;),
        PredExp.stringValue(&amp;quot;s$&amp;quot;),
        PredExp.stringRegex(0),
  
        //三个条件用and连接
        PredExp.and(3));
 
RecordSet records = client.query(null,statement);
 
 
while(records.next()){
    Key key = records.getKey();
    Record record = records.getRecord();
    System.out.println(&amp;quot;key : &amp;quot;+key.toString()+&amp;quot;, record : &amp;quot; + record.toString());
}
//key : ns1:test:null:b4d4568f2c8fe525eadad9b485f53476bb0652bf, record : (gen:1),(exp:361883268),(bins:(bin1:0),(bin2:a:cxovihis))
//key : ns1:test:null:416079a7a6741bcf1df50b980584a3ae5050323d, record : (gen:1),(exp:360929020),(bins:(bin1:4),(bin2:a:afds))
&lt;/code&gt;&lt;/pre&gt;
&lt;h4 id=&#34;scanall&#34;&gt;scanAll&lt;/h4&gt;
&lt;p&gt;扫描set中的所有记录，可以指定要扫描的bin。&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key1 = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;bt1&amp;quot;);
Bin bin1 = new Bin(&amp;quot;DATA&amp;quot;,1);
Bin b1 = new Bin(&amp;quot;z&amp;quot;,1);
client.put(null,key1,bin1,b1);
 
Key key2 = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;bt2&amp;quot;);
Bin bin2 = new Bin(&amp;quot;DATA&amp;quot;,2);
client.put(null,key2,bin2);
 
Key key3 = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;bt3&amp;quot;);
Bin bin3 = new Bin(&amp;quot;z&amp;quot;,3);
client.put(null,key3,bin3);
 
ScanCallback callback = new ScanCallback() {
    @Override
    public void scanCallback(Key key, Record record) throws AerospikeException {
        System.out.println(key.toString()+&amp;quot; -&amp;gt; &amp;quot;+record.toString());
    }
};
client.scanAll(null,&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,callback,&amp;quot;z&amp;quot;);
  
//ns1:test:null:3c84fce89d2b75697840501526c321287bc51233 -&amp;gt; (gen:1),(exp:367151585),(bins:(z:3))
//ns1:test:null:eaa95612885b3a31fbf7c83684261fdc6f0f0c51 -&amp;gt; (gen:1),(exp:367151585),(bins:(z:1))
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;其他&#34;&gt;其他&lt;/h3&gt;
&lt;h4 id=&#34;exists&#34;&gt;exists&lt;/h4&gt;
&lt;p&gt;判断记录是否存在&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;Key key1 = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;123&amp;quot;);
 
Bin bin = new Bin(&amp;quot;DATA&amp;quot;, &amp;quot;1&amp;quot;);
client.put(null,key1,bin);
 
boolean isExists1 = client.exists(null,key1);
//不存在的key
Key key2 = new Key(&amp;quot;ns1&amp;quot;,&amp;quot;test&amp;quot;,&amp;quot;321&amp;quot;);
boolean isExists2 = client.exists(null,key2);
 
System.out.println(&amp;quot;key1:&amp;quot;+isExists1+&amp;quot;,key2:&amp;quot;+isExists2);
//key1:true,key2:false
 
//批量查询
boolean[] result = client.exists(null,new Key[]{key1,key2});
System.out.println(&amp;quot;key1:&amp;quot;+result[0]+&amp;quot;,key2:&amp;quot;+result[1]);
//key1:true,key2:false
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;客户端lua相关&#34;&gt;客户端Lua相关&lt;/h2&gt;
&lt;p&gt;as的lua udf调用分为两种类型：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;record udf，对记录进行更新等相关操作&lt;/li&gt;
&lt;li&gt;stream udf，只能对记录执行只读操作，一般用于聚合查询&lt;/li&gt;
&lt;/ul&gt;
&lt;h3 id=&#34;注册lua&#34;&gt;注册lua&lt;/h3&gt;
&lt;p&gt;有些udf调用必须保证客户端也有相同的脚本，所以这些udf调用尽量在客户端进行注册&lt;br&gt;
例如，stream udf中的reduce操作，是在客户端完成的，服务端只负责将reduce之前的聚合结果返回给客户端，客户端继续执行reduce归约操作。&lt;br&gt;
&lt;em&gt;注册lua&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;//第一种：使用file文件加载
//加载位于resource目录下的test.lua
File file = new File(&amp;quot;src/main/resources/test.lua&amp;quot;);
//该register方法参数含义，从左至右依次为：策略，本地lua文件路径，注册到的服务端lua路径，脚本语言类型
RegisterTask register = client.register(null, file.getPath(), file.getName(), Language.LUA);
 
//第二种：使用类加载器进行加载
//加载位于resource目录下的test.lua
//推荐通过class获取对应的类加载器，如：Example.class.getClassLoader()
//此处通过当前线程获取类加载器
//该register方法参数含义，从左至右依次为：策略，类加载器，本地lua路径，注册到的服务端lua路径，脚本语言类型
RegisterTask register = client.register(null,Thread.currentThread().getContextClassLoader(),&amp;quot;test.lua&amp;quot;,&amp;quot;test.lua&amp;quot;, Language.LUA);
 
//第三种：直接加载lua代码
//此处使用jdk14的代码块，方便展示
String code = &amp;quot;&amp;quot;&amp;quot;
 
            function abc(rec,str)
                -- 如果bin(DATA)不为空，则重复拼接一次自身
                if (rec[&#39;DATA&#39;] ~= nil) then
                    rec[&#39;DATA&#39;] = rec[&#39;DATA&#39;]..rec[&#39;DATA&#39;];
                    aerospike:update(rec);
                end
                return rec;
            end
 
            &amp;quot;&amp;quot;&amp;quot;;
//该register方法参数含义，从左至右依次为：策略，lua源码，注册到的服务端lua路径，脚本语言
RegisterTask register = client.registerUdfString(null, code, &amp;quot;test.lua&amp;quot;, Language.LUA);
  
 
//等待注册完成
register.waitTillComplete();
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;record-udf-调用&#34;&gt;record udf 调用&lt;/h3&gt;
&lt;p&gt;&lt;em&gt;单记录操作&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;String code = &amp;quot;&amp;quot;&amp;quot;
 
        function abc(rec,str)
            -- 如果bin(DATA)不为空，则重复拼接一次自身
            if (rec[&#39;DATA&#39;] ~= nil) then
                rec[&#39;DATA&#39;] = rec[&#39;DATA&#39;]..rec[&#39;DATA&#39;];
                aerospike:update(rec);
            end
            return 1;
        end
 
        &amp;quot;&amp;quot;&amp;quot;;
 
RegisterTask register = client.registerUdfString(null, code, &amp;quot;test.lua&amp;quot;, Language.LUA);
//等待注册完成
register.waitTillComplete();
 
Key key = new Key(&amp;quot;ns1&amp;quot;, &amp;quot;test&amp;quot;, &amp;quot;luaTest123&amp;quot;);
Bin bin = new Bin(&amp;quot;DATA&amp;quot;, &amp;quot;123456&amp;quot;);
client.put(null, key, bin);
 
//上文注册到服务器中的lua为test.lua，所以此处execute第三个参数需要填test；需要执行的方法为abc，所以第四个参数为abc
Object execute = client.execute(null, key, &amp;quot;test&amp;quot;, &amp;quot;abc&amp;quot;);
System.out.println(execute.toString());
//1
System.out.println(client.get(null, key).toString());
//(gen:16),(exp:367399795),(bins:(DATA:123456123456))
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;em&gt;多记录操作&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;//该例子将DATA的bin记录重复一次
String code = &amp;quot;&amp;quot;&amp;quot;
 
        function abc(rec,str)
            -- 如果bin(DATA)不为空，则重复拼接一次自身
            if (rec[&#39;DATA&#39;] ~= nil) then
                rec[&#39;DATA&#39;] = rec[&#39;DATA&#39;]..rec[&#39;DATA&#39;];
                aerospike:update(rec);
            end
            return 1;
        end
 
        &amp;quot;&amp;quot;&amp;quot;;
RegisterTask register = client.registerUdfString(null, code, &amp;quot;test.lua&amp;quot;, Language.LUA);
//等待注册完成
register.waitTillComplete();
 
Key key = new Key(&amp;quot;ns1&amp;quot;, &amp;quot;luaTest&amp;quot;, &amp;quot;luaTest123&amp;quot;);
Bin bin = new Bin(&amp;quot;DATA&amp;quot;, &amp;quot;123456&amp;quot;);
client.put(null, key, bin);
client.put(null,new Key(&amp;quot;ns1&amp;quot;,&amp;quot;luaTest&amp;quot;,1),bin);
client.put(null,new Key(&amp;quot;ns1&amp;quot;,&amp;quot;luaTest&amp;quot;,2),bin);
client.put(null,new Key(&amp;quot;ns1&amp;quot;,&amp;quot;luaTest&amp;quot;,3),bin);
 
Statement statement = new Statement();
statement.setNamespace(&amp;quot;ns1&amp;quot;);
statement.setSetName(&amp;quot;luaTest&amp;quot;);
 
Object execute = client.execute(null,statement , &amp;quot;test&amp;quot;, &amp;quot;abc&amp;quot;);
System.out.println(execute.toString());
//是用statement调用udf，不会有返回值，且异步调用
//这里睡眠3秒，等待udf执行完毕
TimeUnit.SECONDS.sleep(3);
client.scanAll(null,&amp;quot;ns1&amp;quot;,&amp;quot;luaTest&amp;quot;,(k,v)-&amp;gt; System.out.println(v.toString()));
//(gen:2),(exp:367400545),(bins:(DATA:123456123456))
//(gen:2),(exp:367400545),(bins:(DATA:123456123456))
//(gen:2),(exp:367400545),(bins:(DATA:123456123456))
//(gen:2),(exp:367400545),(bins:(DATA:123456123456))
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;stream-udf-调用&#34;&gt;stream udf 调用&lt;/h3&gt;
&lt;p&gt;&lt;em&gt;java&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;private static final Random random = new Random();
private static final String[] BINS = new String[]{&amp;quot;DATA&amp;quot;, &amp;quot;price&amp;quot;};
private static void writeRecords(int keyIndex, Bin bin) {
    Key key = new Key(&amp;quot;ns1&amp;quot;, &amp;quot;luaTest&amp;quot;, keyIndex);
    WritePolicy policy  = new WritePolicy();
    policy.sendKey=true;
    client.put(policy, key, bin);
}
//随机生成只还有DATA或者price bin的记录，并打印生成的price记录数及其值的总和
private static void writeRandomRecords() {
    int count = 0;
    int sum = 0;
    for (int i = 0; i &amp;lt; 100; i++) {
        int binNameIndex = random.nextInt(2);
        int value = random.nextInt(1000);
        String binName = BINS[binNameIndex];
        Bin bin = new Bin(binName, value);
        writeRecords(i, bin);
        if (binNameIndex == 1) {
            count++;
            sum += value;
        }
    }
    System.out.println(String.format(&amp;quot;count : %d , sum : %d&amp;quot;, count, sum));
    //count : 49 , sum : 25717
}
public static void main(String[] args) throws InterruptedException {
    //生成数据
    writeRandomRecords();
    //向服务器注册脚本
    client.register(null, StatisticsLua.class.getClassLoader(), &amp;quot;statistics.lua&amp;quot;, &amp;quot;statistics.lua&amp;quot;, Language.LUA).waitTillComplete();
    Statement statement = new Statement();
    //设置本次聚合操作本地和服务器需要执行的lua脚本
    statement.setAggregateFunction(StatisticsLua.class.getClassLoader(), &amp;quot;statistics.lua&amp;quot;, &amp;quot;statistics&amp;quot;, &amp;quot;add_stat_ops&amp;quot;);
    statement.setNamespace(&amp;quot;ns1&amp;quot;);
    statement.setSetName(&amp;quot;luaTest&amp;quot;);
    ResultSet objects = client.queryAggregate(null, statement);
     
    //打印聚合结果
    while (objects.next()) {
        Map&amp;lt;Object, Object&amp;gt; map = (Map&amp;lt;Object, Object&amp;gt;) objects.getObject();
        map.forEach((k,v)-&amp;gt;{
            System.out.print(String.format(&amp;quot;%s : %s ,&amp;quot;,k,v));
        });
        System.out.println();
        //count : 49 ,sum : 25717 ,
    }
    objects.close();
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;em&gt;lua脚本&lt;/em&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-lua&#34;&gt;-- 过滤操作 过滤掉没有price bin的记录
local function filterPrice(rec)
    return not (rec[&#39;price&#39;] == nil)
end
 
-- 聚合操作 将当前记录的值放到聚合对象中
local function agggregater_stats(map, val)
    map[&#39;count&#39;] = map[&#39;count&#39;] + 1
    map[&#39;sum&#39;] = map[&#39;sum&#39;] + val[&#39;price&#39;]
    return map
end
 
-- 归约操作 将聚合对象归约
local function reduce_stats(a, b)
    a[&#39;count&#39;] = a[&#39;count&#39;] + b[&#39;count&#39;]
    a[&#39;sum&#39;] = a[&#39;sum&#39;] + b[&#39;sum&#39;]
    return a
end
 
-- 执行流操作
function add_stat_ops(stream)
    return stream : filter(filterPrice)
                    : aggregate( map { count=0,sum=0} , agggregater_stats)
                    : reduce(reduce_stats)
end
&lt;/code&gt;&lt;/pre&gt;

&lt;h2 id=&#34;常用policy及其配置&#34;&gt;常用Policy及其配置&lt;/h2&gt;
&lt;p&gt;as中一般policy的属性为public且没有get/set方法，所以直接更改属性值即可。&lt;/p&gt;
&lt;h3 id=&#34;policy&#34;&gt;Policy&lt;/h3&gt;
&lt;p&gt;BatchPolicy、QueryPolicy、ScanPolicy、WritePolicy均继承自该策略。&lt;/p&gt;
&lt;h4 id=&#34;priority优先级&#34;&gt;priority（优先级）&lt;/h4&gt;
&lt;p&gt;命令的优先级，仅用于扫描策略。默认：Priority.DEFAULT&lt;/p&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;值&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;Priority.DEFAULT&lt;/td&gt;
&lt;td&gt;服务器中配置的优先级&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Priority.LOW&lt;/td&gt;
&lt;td&gt;低&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Priority.MEDIUM&lt;/td&gt;
&lt;td&gt;中&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Priority.HIGH&lt;/td&gt;
&lt;td&gt;高&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h4 id=&#34;sendkey&#34;&gt;sendKey&lt;/h4&gt;
&lt;p&gt;写入的时候是否写入原生的key，默认false。&lt;br&gt;
如果写入原生key，则在扫描或查询时，可以在返回的Key对象中获取到原生的key，否则只能获取到经过hash后的字符串。&lt;/p&gt;
&lt;h3 id=&#34;clientpolicy&#34;&gt;ClientPolicy&lt;/h3&gt;
&lt;p&gt;客户端初始化策略。其中设置的各种命令的默认策略是在执行该命令时，传入的策略为null时调用。&lt;/p&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;属性&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;eventLoops&lt;/td&gt;
&lt;td&gt;as中异步命令所需的事件循环组&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;readPolicyDefault&lt;/td&gt;
&lt;td&gt;默认读策略&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;writePolicyDefault&lt;/td&gt;
&lt;td&gt;默认写策略&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;scanPolicyDefault&lt;/td&gt;
&lt;td&gt;默认扫描策略&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;queryPolicyDefault&lt;/td&gt;
&lt;td&gt;默认查询策略&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;batchPolicyDefault&lt;/td&gt;
&lt;td&gt;默认批处理策略&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h3 id=&#34;writepolicy&#34;&gt;WritePolicy&lt;/h3&gt;
&lt;p&gt;写入策略，一般为更新或删除记录时传入。&lt;/p&gt;
&lt;h4 id=&#34;expiration过期时间&#34;&gt;expiration（过期时间）&lt;/h4&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;值&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;-2&lt;/td&gt;
&lt;td&gt;本次更新记录不会刷新过期时间&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;-1&lt;/td&gt;
&lt;td&gt;永不过期&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;0&lt;/td&gt;
&lt;td&gt;使用配置文件中对应配置的过期时间&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;大于0&lt;/td&gt;
&lt;td&gt;设置该值时间后过期，单位为秒&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h4 id=&#34;generation预期更新次数&#34;&gt;generation（预期更新次数）&lt;/h4&gt;
&lt;p&gt;设置预期的更新次数，与generationPolicy一起使用。实际记录的generation每次进行更新操作都会加1，该值在读取记录时可获取到，见Record。&lt;/p&gt;
&lt;h4 id=&#34;generationpolicy预期策略&#34;&gt;generationPolicy（预期策略）&lt;/h4&gt;
&lt;p&gt;当写入策略设置的generation（即预期）与服务器当前记录的generation（即实际）不符合当前设置的预期策略时，会抛出异常。&lt;/p&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;值&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;GenerationPolicy.NONE&lt;/td&gt;
&lt;td&gt;不限制&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;GenerationPolicy.EXPECT_GEN_GT&lt;/td&gt;
&lt;td&gt;更新/删除时，预期大于实际则成功&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;GenerationPolicy.EXPECT_GEN_EQUAL&lt;/td&gt;
&lt;td&gt;更新/删除时，预期与实际一致则成功&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h4 id=&#34;recordexistsaction重复策略&#34;&gt;recordExistsAction（重复策略）&lt;/h4&gt;
&lt;p&gt;如何处理已经存在的记录，默认为RecordExistsAction.UPDATE&lt;/p&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;值&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;RecordExistsAction.UPDATE&lt;/td&gt;
&lt;td&gt;创建或更新，没有涉及到更新的bin不会丢失&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;RecordExistsAction.UPDATE_ONLY&lt;/td&gt;
&lt;td&gt;仅更新，不存在则失败，没有涉及到更新的bin不会丢失&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;RecordExistsAction.REPLACE&lt;/td&gt;
&lt;td&gt;创建或者替换，没有涉及到更新的bin会丢失&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;RecordExistsAction.REPLACE_ONLY&lt;/td&gt;
&lt;td&gt;仅替换，不存在则失败，没有涉及到更新的bin会丢失&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;RecordExistsAction.CREATE_ONLY&lt;/td&gt;
&lt;td&gt;仅创建，存在则失败&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h4 id=&#34;commitlevel提交等级&#34;&gt;commitLevel（提交等级）&lt;/h4&gt;
&lt;p&gt;默认为CommitLevel.COMMIT_ALL。&lt;/p&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;值&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;CommitLevel.COMMIT_ALL&lt;/td&gt;
&lt;td&gt;等待主服务器和副本服务器全部执行成功&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;CommitLevel.COMMIT_MASTER&lt;/td&gt;
&lt;td&gt;只等待主服务器执行成功&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h3 id=&#34;scanpolicy&#34;&gt;ScanPolicy&lt;/h3&gt;
&lt;p&gt;扫描策略&lt;/p&gt;
&lt;h4 id=&#34;scanpercent扫描百分比&#34;&gt;scanPercent（扫描百分比）&lt;/h4&gt;
&lt;p&gt;要扫描的数据百分比，有效整数范围是1到100。默认为100。&lt;/p&gt;
&lt;h4 id=&#34;concurrentnodes&#34;&gt;concurrentNodes&lt;/h4&gt;
&lt;p&gt;并行或串行发出扫描请求。默认true&lt;/p&gt;
&lt;h4 id=&#34;includebindata是否返回bin数据&#34;&gt;includeBinData（是否返回bin数据）&lt;/h4&gt;
&lt;p&gt;false仅返回Record Header。默认true。&lt;/p&gt;
&lt;h3 id=&#34;querypolicy&#34;&gt;QueryPolicy&lt;/h3&gt;
&lt;p&gt;查询策略&lt;/p&gt;
&lt;h4 id=&#34;includebindata是否返回bin数据-2&#34;&gt;includeBinData（是否返回bin数据）&lt;/h4&gt;
&lt;p&gt;false仅返回Record Header。默认true。&lt;/p&gt;
&lt;h3 id=&#34;listpolicy&#34;&gt;ListPolicy&lt;/h3&gt;
&lt;p&gt;对list类型bin的操作策略。该策略的属性均被final修饰，所以创建该策略时需指定对应属性。&lt;/p&gt;
&lt;h4 id=&#34;构造方法&#34;&gt;构造方法&lt;/h4&gt;
&lt;p&gt;1.无参构造方法&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;public ListPolicy() {
   this(ListOrder.UNORDERED, ListWriteFlags.DEFAULT);
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;2.ListOrder与ListWriteFlags&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;public ListPolicy(ListOrder order, int flags);
&lt;/code&gt;&lt;/pre&gt;
&lt;h4 id=&#34;listorder&#34;&gt;ListOrder&lt;/h4&gt;
&lt;p&gt;与ListOrder中枚举常量关联，只有：ListOrder.ORDERED（1，排序）、ListOrder.UNORDERED（0，未排序）两种值。&lt;/p&gt;
&lt;h4 id=&#34;listwriteflags&#34;&gt;ListWriteFlags&lt;/h4&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;常量&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;ListWriteFlags.DEFAULT&lt;/td&gt;
&lt;td&gt;允许重复值，以及可以在任何索引出插入。&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListWriteFlags.ADD_UNIQUE&lt;/td&gt;
&lt;td&gt;只能添加唯一的值。&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListWriteFlags.INSERT_BOUNDED&lt;/td&gt;
&lt;td&gt;强制约束插入边界，不允许插入当前列表边界之外的索引处。&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListWriteFlags.NO_FAIL&lt;/td&gt;
&lt;td&gt;如果列表因为写标志位限制而失败，则不引发错误。&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;ListWriteFlags.PARTIAL&lt;/td&gt;
&lt;td&gt;如果有因为写标志位限制导致写入失败，则允许提交其他有效的列表项。&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h3 id=&#34;mappolicy&#34;&gt;MapPolicy&lt;/h3&gt;
&lt;p&gt;对map类型bin的操作策略。与ListPolicy相同，需要在创建policy对象时指定属性值。&lt;/p&gt;
&lt;h4 id=&#34;构造方法-2&#34;&gt;构造方法&lt;/h4&gt;
&lt;p&gt;1.无参构造方法&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;public MapPolicy() {
   this(MapOrder.UNORDERED, MapWriteMode.UPDATE);
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;2.使用MapOrder与MapWriteMode&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;public MapPolicy(MapOrder order, MapWriteMode writeMode);
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;3.使用MapOrder与MapWriteFlags&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;public MapPolicy(MapOrder order, int flags);
&lt;/code&gt;&lt;/pre&gt;
&lt;h4 id=&#34;maporder&#34;&gt;MapOrder&lt;/h4&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;枚举值&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;MapOrder.UNORDERED&lt;/td&gt;
&lt;td&gt;不排序。默认&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapOrder.KEY_ORDERED&lt;/td&gt;
&lt;td&gt;按key排序&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapOrder.KEY_VALUE_ORDERED&lt;/td&gt;
&lt;td&gt;先按key排序，后按value排序&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h4 id=&#34;mapwritemode&#34;&gt;MapWriteMode&lt;/h4&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;枚举值&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;MapWriteMode.UPDATE&lt;/td&gt;
&lt;td&gt;key存在则覆盖，不存在则创建&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapWriteMode.CREATE_ONLY&lt;/td&gt;
&lt;td&gt;key存在则写入失败，不存在则创建&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapWriteMode.UPDATE_ONLY&lt;/td&gt;
&lt;td&gt;key存在则覆盖，不存在则写入失败&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h4 id=&#34;mapwriteflags&#34;&gt;MapWriteFlags&lt;/h4&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;常量名&lt;/th&gt;
&lt;th&gt;说明&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;MapWriteFlags.DEFAULT&lt;/td&gt;
&lt;td&gt;允许创建和更新。默认&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapWriteFlags.CREATE_ONLY&lt;/td&gt;
&lt;td&gt;key存在则对该key的操作将被拒绝，不存在则创建&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapWriteFlags.UPDATE_ONLY&lt;/td&gt;
&lt;td&gt;key存在则覆盖，不存在则对该key的操作将被拒绝&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapWriteFlags.NO_FAIL&lt;/td&gt;
&lt;td&gt;如果因为写标志位约束而拒绝，则不会引发错误&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;MapWriteFlags.PARTIAL&lt;/td&gt;
&lt;td&gt;如果因为写标志位约束而拒绝，则允许提交其他有效项&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h2 id=&#34;参考及常用文档&#34;&gt;参考及常用文档&lt;/h2&gt;
&lt;p&gt;&lt;a href=&#34;https://github.com/aerospike/aerospike-client-java/tree/master/examples&#34;&gt;Aerospike Demo&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;&lt;a href=&#34;https://docs.aerospike.com/client/java/index.html&#34;&gt;Aerospike Java client 文档&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;&lt;a href=&#34;https://javadoc.io/doc/com.aerospike/aerospike-client/latest/index.html&#34;&gt;Aerospike doc 文档&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;&lt;a href=&#34;https://docs.aerospike.com/dev_reference/error_codes&#34;&gt;Aerospike 错误码 文档&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;&lt;a href=&#34;https://javadoc.io/doc/com.aerospike/aerospike-client/latest/constant-values.html&#34;&gt;Aerospike java client 错误码文档&lt;/a&gt;&lt;/p&gt;
&lt;h2 id=&#34;常见问题&#34;&gt;常见问题&lt;/h2&gt;
&lt;ol&gt;
&lt;li&gt;Java client中，批量查询及按条件查询、扫描时，如果as client初始化时没有连接全部的as集群节点，则结果记录可能会少于实际记录。&lt;br&gt;
原因：在java client 4.4.0版本以下，批量查询发送命令前，只会将单条记录发送到该记录对应的主节点上【即使指定pocliy中的查询方式也只会查主节点】（as将namespace分成4096个分区，记录会根据set和key散列到这4096个分区中，集群中的节点会平分这4096个分区成为该分区的主节点）如果client没有连接这个主节点则会抛出异常。4.4.0及以上版本已经修正为按照Pocliy策略中指定的查询方式寻找节点；而按条件查询、扫描的指令发送到节点上，节点只会处理自己所管的主分区内的记录，其他的直接跳过。&lt;/li&gt;
&lt;/ol&gt;
">Aerospike Java client端常用API</a>
